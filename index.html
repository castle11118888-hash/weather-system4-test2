<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="version" content="B6.3.9" />
  <title>天氣｜版本B6.3.9</title>
  <style>
    :root{
      --bg:#f4f6fb; --card:#fff; --text:#111827; --muted:#6b7280; --border:#e5e7eb;
      --primary:#0f172a; --accent:#4f46e5; --ok:#16a34a; --warn:#d97706; --info:#2563eb; --danger:#dc2626; --chip:#f3f4f6;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Noto Sans TC,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .app{width:min(95vw,1800px);max-width:none;margin:0 auto;padding:20px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:20px;box-shadow:0 2px 10px rgba(0,0,0,.03)}
    .topbar{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;gap:16px}
    .title{font-size:28px;font-weight:800}
    .sub{font-size:13px;color:var(--muted)}
    .layout{display:grid;grid-template-columns:250px minmax(0,1fr);gap:20px;margin-top:20px;align-items:start}
    .sidebar{padding:16px;position:sticky;top:20px;height:fit-content}
    .content{display:grid;gap:20px;min-width:0}
    .navbtn{width:100%;padding:12px 14px;border-radius:14px;border:none;background:transparent;text-align:left;font-size:14px;font-weight:700;cursor:pointer}
    .navbtn.active{background:var(--primary);color:#fff}
    .navbtn:hover{background:#f3f4f6}.navbtn.active:hover{background:var(--primary)}
    .grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}
    .grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
    .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
    .stat{padding:18px}.stat .num{font-size:34px;font-weight:900;margin-top:8px}
    .section{padding:18px}.section h2{margin:0 0 14px;font-size:22px}
    .toolbar,.row,.top-actions{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
    .list{display:grid;gap:12px}
    input,select,textarea,button{font:inherit}
    input,select,textarea{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:14px;background:#fff}
    textarea{min-height:120px;resize:vertical}
    .btn{border:none;border-radius:14px;padding:11px 16px;font-weight:700;cursor:pointer}
    .btn.primary{background:var(--primary);color:#fff}
    .btn.secondary{background:#fff;border:1px solid var(--border)}
    .btn.danger{background:var(--danger);color:#fff}
    .btn.warn{background:#fff7ed;color:#9a3412;border:1px solid #fdba74}
    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chip{padding:5px 10px;border-radius:999px;background:var(--chip);font-size:12px;font-weight:700}
    .chip.ok{background:#dcfce7;color:#166534}.chip.info{background:#dbeafe;color:#1d4ed8}.chip.warn{background:#fef3c7;color:#92400e}.chip.neutral{background:#e5e7eb;color:#374151}
    .item{padding:16px;border:1px solid var(--border);border-radius:18px;background:#fff}
    .storecard{padding:16px;cursor:pointer;transition:.15s transform,.15s box-shadow}
    .storecard:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(0,0,0,.06)}
    .progress{height:10px;background:#edf2f7;border-radius:999px;overflow:hidden;margin-top:12px}
    .bar{height:100%;background:var(--accent)}
    .muted{color:var(--muted)} .small{font-size:13px}
    .login-wrap{max-width:1100px;margin:36px auto;padding:20px;display:grid;grid-template-columns:1.1fr .9fr;gap:20px}
    .hero{padding:28px}.login{padding:24px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr 1fr 140px;gap:10px}
    .warnbox{padding:12px 14px;border-radius:14px;background:#fffbeb;color:#92400e;border:1px solid #fde68a}
    .okbox{padding:12px 14px;border-radius:14px;background:#ecfdf5;color:#166534;border:1px solid #a7f3d0}
    .badge{display:inline-block;background:#eef2ff;color:#4338ca;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:800}
    .empty{padding:26px;text-align:center;border-radius:16px;background:#f8fafc;color:var(--muted)}
    mark{background:#fde68a;padding:0 2px;border-radius:4px}
    .table{width:100%;border-collapse:separate;border-spacing:0}.table th,.table td{padding:12px 10px;border-bottom:1px solid var(--border);text-align:left;font-size:14px;vertical-align:middle}.table th{white-space:nowrap;color:var(--primary);font-weight:800}.table td input,.table td select{min-height:44px}.account-table .col-account{width:17%}.account-table .col-name{width:13%}.account-table .col-email{width:18%}.account-table .col-status{width:8%}.account-table .col-role{width:10%}.account-table .col-store{width:8%}.account-table .col-default-store{width:9%}.account-table .col-permission{width:11%}.account-table .col-password{width:7%}.account-table .col-actions{width:8%}.account-actions{display:flex;flex-direction:column;gap:10px;align-items:stretch}.account-actions .btn{width:100%}.permission-chip{display:inline-flex;align-items:center;justify-content:center;min-width:88px;line-height:1.4;text-align:center;white-space:normal}.store-manage-row{display:grid;grid-template-columns:90px minmax(0,1fr) 120px;gap:12px;align-items:center}@media (max-width:980px){.account-table,.account-table thead,.account-table tbody,.account-table th,.account-table td,.account-table tr{display:block}.account-table thead{display:none}.account-table tr{border:1px solid var(--border);border-radius:18px;padding:14px;margin-bottom:12px;background:#fff}.account-table td{border-bottom:none;padding:8px 0}.account-table td::before{content:attr(data-label);display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:700}.account-actions{flex-direction:row}.store-manage-row{grid-template-columns:1fr}} 
    .w240{width:240px}.w180{width:180px}.w140{width:140px}

    .month-date-panel{display:grid;grid-template-columns:220px minmax(0,1fr);gap:12px;align-items:stretch;width:100%}
    .handover-title-block{display:grid;gap:10px;align-content:center;justify-items:start}
    .month-picker-box{border:1px solid var(--border);border-radius:16px;background:#fff;padding:10px 12px;display:grid;gap:8px;align-items:center}
    .month-picker-main{display:grid;gap:6px;min-width:0}
    .month-picker-box label{font-size:12px;color:var(--muted);font-weight:800}
    .month-picker-box input[type="month"]{border:none;padding:4px 0;border-radius:0;font-size:20px;font-weight:900;color:var(--primary)}
    .today-btn{height:46px;border:1px solid #bfdbfe;border-radius:14px;background:#eff6ff;color:#1d4ed8;font-weight:900;padding:0 14px;cursor:pointer;white-space:nowrap}
    .today-btn:hover{background:#dbeafe;border-color:#93c5fd}
    .month-days-strip{border:1px solid var(--border);border-radius:16px;background:#fff;padding:14px;display:grid;gap:10px;align-items:center;overflow:visible}
    .month-calendar-head{display:flex;align-items:center;justify-content:space-between;gap:10px;font-weight:900;color:var(--primary)}
    .month-calendar-title{font-size:18px;font-weight:900;white-space:nowrap}
    .month-calendar-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;text-align:center}
    .month-calendar-week{font-size:12px;color:var(--muted);font-weight:900;padding:3px 0}
    .month-day-btn{border:1px solid transparent;background:#fff;border-radius:10px;min-width:0;height:36px;display:grid;place-items:center;cursor:pointer;font-weight:900;color:var(--text);transition:.15s transform,.15s background,.15s border-color;position:relative}
        .month-day-btn:hover{transform:translateY(-1px);background:#f3f4f6}
    .month-day-btn.other{color:#cbd5e1;background:#fff}
    .month-day-btn.complete{color:#92400e;border-color:#facc15;background:#fef9c3}
    .month-day-btn.unfinished{color:#dc2626;border-color:rgba(220,38,38,.35);background:#fff5f5}
    .month-day-btn.active{background:var(--primary)!important;color:#fff!important;border-color:var(--primary)!important;box-shadow:0 6px 16px rgba(15,23,42,.18)}
    .month-day-btn .dow{display:none}
    @media (max-width:1200px){.month-calendar-grid{gap:6px}}
    @media (max-width:980px){.month-date-panel{grid-template-columns:1fr}.handover-title-block{order:1;grid-template-columns:1fr auto;align-items:center}.month-picker-box{order:2}.month-days-strip{padding:12px;order:3}.month-day-btn{height:38px}}
    @media (max-width:560px){.today-btn{width:100%}.handover-title-block{grid-template-columns:1fr}.month-calendar-title{font-size:16px}.month-day-btn{height:36px}}
    .loading{padding:40px;text-align:center;color:var(--muted)}
    .modalbg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;padding:16px}
    .modal{max-width:560px;width:100%;background:#fff;border-radius:20px;border:1px solid var(--border);padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.2)}
    .unread-badge{position:absolute;top:10px;right:10px;min-width:22px;height:22px;padding:0 6px;border-radius:999px;background:#dc2626;color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;line-height:1}
    .item.focused-item{border-color:#f59e0b!important;box-shadow:0 0 0 4px rgba(245,158,11,.22),0 12px 28px rgba(15,23,42,.12);animation:focusPulse 1s ease-in-out 3}
    @keyframes focusPulse{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
    .search-hit{width:100%;text-align:left;border:1px solid var(--border);background:#fff;border-radius:16px;padding:12px;cursor:pointer;display:block}
    .search-hit:hover{border-color:#93c5fd;background:#f8fbff;box-shadow:0 8px 18px rgba(37,99,235,.08)}
    .search-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
    .search-actions select{width:auto;min-width:150px}

    .shift-columns{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;align-items:start}
    .shift-column{border:1px solid var(--border);border-radius:20px;background:#f8fafc;min-height:260px;padding:14px;display:grid;gap:12px;align-content:start}
    .shift-column-head{display:flex;justify-content:space-between;align-items:center;gap:10px;position:sticky;top:0;background:#f8fafc;padding-bottom:4px;z-index:1}
    .shift-column-title{font-size:18px;font-weight:900;color:var(--primary)}
    .shift-column-counts{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
    .shift-empty{padding:28px 12px;text-align:center;border-radius:16px;background:#fff;color:var(--muted);border:1px dashed var(--border)}
    .shift-column .item{box-shadow:0 1px 4px rgba(15,23,42,.03)}
    @media (max-width:1200px){.shift-columns{grid-template-columns:1fr}.shift-column{min-height:unset}.shift-column-head{position:static}}

    .date-wrap{position:relative;display:inline-flex;align-items:center;gap:8px;vertical-align:middle}
    .date-wrap input[type="date"]{min-width:180px}
    .date-calendar{position:absolute;top:calc(100% + 8px);right:0;z-index:50;width:280px;background:#fff;border:1px solid var(--border);border-radius:18px;box-shadow:0 18px 36px rgba(15,23,42,.16);padding:14px;color:var(--text)}
    .date-calendar.left{left:0;right:auto}
    .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;font-weight:900}
    .cal-nav{border:none;background:#f8fafc;border-radius:10px;width:34px;height:34px;cursor:pointer;font-weight:900;color:var(--primary)}
    .cal-week,.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;text-align:center}
    .cal-week div{font-size:14px;color:var(--muted);font-weight:800;padding:4px 0}
    .cal-day{border:none;background:#fff;border-radius:10px;min-height:42px;cursor:pointer;font-weight:900;color:var(--text);position:relative;font-size:22px}
    .cal-day:hover{background:#f3f4f6}
    .cal-day.other{color:#cbd5e1}
    .cal-day.complete{color:#92400e;border:1px solid #facc15;background:#fef9c3}
    .cal-day.unfinished{color:#dc2626;border:1px solid rgba(220,38,38,.35);background:#fff5f5}
    .cal-day.selected{background:#1d4ed8!important;color:#fff!important;border-color:#1d4ed8!important;box-shadow:0 0 0 3px rgba(29,78,216,.16)}
    .cal-legend{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-top:10px;font-size:12px;color:var(--muted)}
    .cal-dot-yellow{display:inline-block;width:9px;height:9px;border-radius:999px;background:#facc15;margin-right:4px}
    .cal-dot-red{display:inline-block;width:9px;height:9px;border-radius:999px;background:#dc2626;margin-right:4px}
    @media (max-width:560px){.date-calendar{left:0;right:auto;width:min(86vw,280px)}}
    .landing{width:min(96vw,1680px);max-width:none;margin:0 auto;padding:18px;display:grid;gap:16px}
    .weather-shell{display:grid;grid-template-columns:minmax(0,1.55fr) minmax(320px,.65fr);gap:16px;align-items:stretch}
    .weather-hero{padding:24px;background:
      linear-gradient(90deg,rgba(7,12,28,.82) 0%,rgba(14,23,54,.60) 42%,rgba(15,23,42,.42) 100%),
      linear-gradient(135deg,#0f172a 0%,#1e3a8a 48%,#60a5fa 100%) center center/cover no-repeat;color:#fff;overflow:hidden;position:relative;min-height:670px;width:100%}
    .weather-hero:before,.weather-hero:after{content:"";position:absolute;border-radius:999px;background:rgba(255,255,255,.10)}
    .weather-hero:before{width:220px;height:220px;right:-60px;top:-40px}
    .weather-hero:after{width:160px;height:160px;left:-40px;bottom:-60px}
    .weather-row{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;position:relative;z-index:1}
    .weather-temp{font-size:58px;font-weight:900;line-height:1}
    .weather-city{font-size:30px;font-weight:900;line-height:1.2}
    .weather-desc{font-size:16px;opacity:.92;margin-top:8px}
    .weather-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px;position:relative;z-index:1}
    .weather-mini .mini{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:14px}
    .weather-mini .mini .label{font-size:12px;opacity:.85}
    .weather-mini .mini .value{font-size:22px;font-weight:800;margin-top:8px}
    .portal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .portal-box{padding:18px}
    .portal-box h3{margin:0 0 8px;font-size:18px}
    .login-panel{padding:18px;display:grid;gap:14px;align-content:start}
    .login-panel .head{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .public-grid{display:grid;grid-template-columns:1fr;gap:20px;align-content:start}
    .weather-note{padding:16px;border-radius:18px;background:#eff6ff;border:1px solid #bfdbfe;color:#1e3a8a}
    .weather-summary{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;position:relative;z-index:1}
    .weather-summary-right{text-align:right;position:relative;z-index:1;min-width:140px}
    .weather-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;position:relative;z-index:1}
    .weather-meta .chip{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.16)}
    .weather-actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:18px;position:relative;z-index:1}
    .weather-actions .btn{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.18);padding:14px 22px;border-radius:18px;font-size:18px;font-weight:800}
    .weather-actions .btn:hover{background:rgba(255,255,255,.22)}
    .weather-actions{margin-bottom:8px}
    .weather-summary-right{padding-top:2px}
    .weather-day{min-height:156px}
    .weather-day .day-name{font-size:15px}
    .weather-day .day-date{font-size:13px}
    .weather-day .day-temp{font-size:16px}
    .weather-updated{font-size:12px;opacity:.86}
    .weather-week{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px;margin-top:18px;position:relative;z-index:1}
    .weather-day{background:rgba(15,23,42,.38);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.24);border-radius:18px;padding:14px 12px;text-align:center;min-height:146px;display:grid;align-content:start;gap:6px}
    .weather-day .day-name{font-size:13px;font-weight:800}
    .weather-day .day-date{font-size:12px;opacity:.82}
    .weather-day .day-icon{font-size:28px;line-height:1.1;margin-top:4px}
    .weather-day .day-rain{font-size:12px;opacity:.92}
    .weather-day .day-temp{font-size:14px;font-weight:800}
    .weather-placeholder{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px;margin-top:18px;position:relative;z-index:1}
    .weather-skeleton{height:146px;border-radius:18px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.12)}
    .shortcut-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px;margin-top:14px;position:relative;z-index:1}
    .shortcut-tile{display:grid;place-items:center;min-height:74px;border-radius:18px;background:rgba(15,23,42,.32);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.22);cursor:pointer;transition:.18s transform,.18s background,.18s box-shadow}
    .shortcut-tile:hover{transform:translateY(-2px);background:rgba(255,255,255,.18);box-shadow:0 10px 22px rgba(15,23,42,.12)}
    .shortcut-emoji{font-size:38px;line-height:1}
    .market-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;margin-top:14px;position:relative;z-index:1}
    .market-card{background:rgba(255,255,255,.96);color:var(--primary);box-shadow:0 12px 28px rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:18px 10px;display:grid;justify-items:center;align-content:center;min-height:138px;text-align:center}
    .market-icon{font-size:34px;line-height:1;margin-bottom:10px;font-weight:900}
    .market-title{font-size:15px;font-weight:900;line-height:1.2}
    .market-subtitle{font-size:12px;color:#334155;line-height:1.2;margin-top:4px;font-weight:800}
    .weather-shell.secure-home{grid-template-columns:1fr}
    .weather-shell.secure-home .weather-hero{min-height:670px}
    .secure-entry-note{margin-top:14px;font-size:13px;opacity:.88;position:relative;z-index:1}
    .login-back{width:100%;margin-bottom:10px}
    @media (min-width:1400px){
      .app{width:min(98vw,1920px)}
      .landing{width:min(97vw,1760px)}
      .topbar{padding:22px 26px}
      .section{padding:22px}
      .stat{padding:22px}
      .w240{width:320px}
    }
    @media (max-width:1200px){.weather-week,.weather-placeholder{grid-template-columns:repeat(4,minmax(0,1fr))}.shortcut-grid{grid-template-columns:repeat(4,minmax(0,1fr))}.market-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.landing{width:min(98vw,1400px)}}
    @media (max-width:980px){
      .weather-shell,.public-grid{grid-template-columns:1fr}
      .weather-mini,.portal-grid{grid-template-columns:1fr}
      .weather-summary{flex-direction:column}
      .weather-summary-right{text-align:left;min-width:0}
      .weather-week,.weather-placeholder{grid-template-columns:repeat(2,minmax(0,1fr))}
      .shortcut-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
      .market-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
      .weather-day,.weather-skeleton{min-height:132px}
      .layout,.login-wrap{grid-template-columns:1fr}
      .sidebar{position:static;top:auto}
      .grid4,.grid3{grid-template-columns:1fr 1fr}
      .grid2,.form-grid{grid-template-columns:1fr}
      .app{width:100%;padding:12px}.title{font-size:22px}
      .topbar{padding:18px}
      .weather-temp{font-size:54px}
      .weather-city{font-size:28px}
    }
    @media (max-width:560px){
      .weather-week,.weather-placeholder{grid-template-columns:1fr}
      .shortcut-grid{grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
      .shortcut-tile{min-height:64px;border-radius:16px}
      .shortcut-emoji{font-size:30px}
      .market-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
      .market-card{min-height:112px;padding:14px 8px;border-radius:18px}
      .weather-day,.weather-skeleton{min-height:unset}
      .weather-actions .btn{width:100%}
      .login-panel{padding:18px}
      .weather-hero{padding:20px}
    }
  
    .month-day-btn{gap:0!important}
    .month-day-btn span{font-size:14px!important;font-weight:900!important}
    .month-day-btn span:empty{display:none!important}

  
    .month-day-btn small,
    .month-day-btn .weekday,
    .month-day-btn [data-weekday]{display:none!important}

  
    .register-card{margin-top:16px}
    .register-card .list{gap:10px}
    .register-card label{font-size:13px;color:var(--muted);font-weight:700}
    .register-card input{min-height:44px}

  
.admin-create-hidden{display:none !important;}


    /* B6.3.9：隱藏管理員建立帳號區塊 */
    .admin-create-account,
    #adminCreateAccount,
    [data-section="admin-create-account"],
    [data-admin-create-account="true"]{display:none!important}

function weatherCodeInfo(code){
  return weatherCodeMap[Number(code)] || ["🌤️","天氣資料"];
}
function weatherWeekdayLabel(dateText,index){
  if(index===0) return "今天";
  if(index===1) return "明天";
  const d = new Date(`${dateText}T00:00:00+08:00`);
  const names = ["週日","週一","週二","週三","週四","週五","週六"];
  return names[d.getDay()] || "預報";
}
function weatherDisplayDate(dateText){
  const parts = String(dateText||"").split("-");
  return parts.length===3 ? `${parts[1]}/${parts[2]}` : "--/--";
}
async function fetchOpenMeteoWeather(place){
  const params = new URLSearchParams({
    latitude:String(place.latitude),
    longitude:String(place.longitude),
    timezone:"Asia/Taipei",
    current:"temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,precipitation_probability",
    daily:"weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max",
    forecast_days:"7"
  });
  const res = await fetch(`${weatherApiBase}?${params.toString()}`, { cache:"no-store" });
  if(!res.ok) throw new Error(`weather api ${res.status}`);
  return await res.json();
}
function applyWeatherPayload(data, place, usingCurrentLocation=false){
  const current = data.current || {};
  const daily = data.daily || {};
  const [icon, desc] = weatherCodeInfo(current.weather_code ?? (daily.weather_code||[])[0]);
  const times = daily.time || [];
  const week = times.slice(0,7).map((dateText,index) => {
    const [dayIcon, dayText] = weatherCodeInfo((daily.weather_code||[])[index]);
    return {
      weekday: weatherWeekdayLabel(dateText,index),
      displayDate: weatherDisplayDate(dateText),
      icon: dayIcon,
      text: dayText,
      high: Math.round((daily.temperature_2m_max||[])[index] ?? 0),
      low: Math.round((daily.temperature_2m_min||[])[index] ?? 0),
      rain: Math.round((daily.precipitation_probability_max||[])[index] ?? 0)
    };
  });
  const now = new Date();
  weatherState = {
    ...weatherState,
    loading:false,
    city: place.city || (usingCurrentLocation ? "目前位置" : "台中市"),
    currentTemp: Math.round(current.temperature_2m ?? weatherState.currentTemp),
    currentDesc: desc,
    humidity: `${Math.round(current.relative_humidity_2m ?? 0)}%`,
    rainToday: `${Math.round(current.precipitation_probability ?? ((daily.precipitation_probability_max||[])[0] ?? 0))}%`,
    comfort: `體感 ${Math.round(current.apparent_temperature ?? current.temperature_2m ?? 0)}°C`,
    icon,
    week: week.length ? week : weatherState.week,
    updatedAt: `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,"0")}/${String(now.getDate()).padStart(2,"0")} ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`,
    usingCurrentLocation,
    error:"",
    note:"即時天氣資料來源：Open-Meteo，自動連線更新。"
  };
}
function getBrowserLocation(){
  return new Promise((resolve,reject) => {
    if(!navigator.geolocation) return reject(new Error("此瀏覽器不支援定位"));
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ city:"目前位置", latitude:pos.coords.latitude, longitude:pos.coords.longitude }),
      err => reject(err),
      { enableHighAccuracy:false, timeout:8000, maximumAge:600000 }
    );
  });
}
async function refreshWeather(forceLocation=false){
  const requestId = Date.now();
  weatherLastRequest = requestId;
  weatherState = { ...weatherState, loading:true, error:"", note: forceLocation ? "正在取得目前位置天氣..." : "正在連線更新即時天氣..." };
  if(!state.currentUser || !state.profile) render();
  try{
    const place = forceLocation ? await getBrowserLocation() : weatherDefaultPlace;
    const data = await fetchOpenMeteoWeather(place);
    if(weatherLastRequest !== requestId) return;
    applyWeatherPayload(data, place, forceLocation);
  }catch(err){
    if(weatherLastRequest !== requestId) return;
    weatherState = {
      ...weatherState,
      loading:false,
      city: forceLocation ? "目前位置" : "台中市",
      error:"天氣連線暫時失敗，已保留最後一次資料。",
      note:"請確認網路或瀏覽器定位權限後再刷新。"
    };
  }
  if(!state.currentUser || !state.profile) render();
}

const escapeHtml = s => String(s ?? "").replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
function highlightText(text, keyword){
  const src = String(text ?? ""), q = String(keyword ?? "").trim();
  if(!q) return escapeHtml(src);
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

}

function selectPhotoFiles(fileList){
  const files = Array.from(fileList || []);
  if(!files.length){ resetPendingPhoto(); render(); return; }
  if(files.length > 5) return alert("一則交接最多可上傳 5 個媒體檔案");
  const invalid = files.find(file => !(String(file.type||"").startsWith("image/") || String(file.type||"").startsWith("video/")));
  if(invalid) return alert("請選擇圖片或影片檔案");
  const oversize = files.find(file => file.size > 20 * 1024 * 1024);
  if(oversize) return alert(`單一媒體檔案請控制在 20MB 以內：${oversize.name || "未命名檔案"}`);
  revokePhotoPreview();
  pendingPhotoFiles = files;
  state.newItemPhotoPreviews = files.map(file => URL.createObjectURL(file));
  state.newItemPhotoNames = files.map(file => file.name || "媒體檔案");
  state.newItemMediaTypes = files.map(file => String(file.type || ""));
  render();
}
function removePendingPhoto(index){
  if(index < 0 || index >= pendingPhotoFiles.length) return;
  const previews = Array.isArray(state.newItemPhotoPreviews) ? [...state.newItemPhotoPreviews] : [];
  const targetUrl = previews[index];
  if(targetUrl && String(targetUrl).startsWith("blob:")){
    try{ URL.revokeObjectURL(targetUrl); }catch(e){}
  }
  pendingPhotoFiles.splice(index,1);
  previews.splice(index,1);
  const names = Array.isArray(state.newItemPhotoNames) ? [...state.newItemPhotoNames] : [];
  names.splice(index,1);
  const mediaTypes = Array.isArray(state.newItemMediaTypes) ? [...state.newItemMediaTypes] : [];
  mediaTypes.splice(index,1);
  state.newItemPhotoPreviews = previews;
  state.newItemPhotoNames = names;
  state.newItemMediaTypes = mediaTypes;
  render();
}
function formatResetPasswordError(error){
  const code = String(error?.code || "");
  if(code === "auth/invalid-email") return "Email 格式不正確，請重新確認。";
  if(code === "auth/missing-email") return "請先輸入 Email。";
  if(code === "auth/too-many-requests") return "此功能操作過於頻繁，請稍後再試。";
  if(code === "auth/network-request-failed") return "網路連線異常，請確認網路後再試。";
  if(code === "auth/user-not-found") return "查無此登入帳號，請確認 Email 是否正確。";
  if(code === "auth/unauthorized-continue-uri") return "Firebase 尚未授權目前網域。系統已改用 Firebase 預設重設信流程；若仍看到此訊息，請重新整理後再試。";
  if(code === "auth/invalid-continue-uri") return "重設密碼導向網址設定錯誤。";
  return `寄送失敗：${code || "unknown"}${error?.message ? "｜" + error.message : ""}`;
}

function formatStorageError(error){
  const code = String(error?.code || "");
  const msg = String(error?.message || "");
  if(code.includes("storage/unauthorized")) return "沒有 Storage 寫入權限（storage/unauthorized）";
  if(code.includes("storage/unauthenticated")) return "目前登入狀態無法通過 Storage 驗證（storage/unauthenticated）";
  if(code.includes("storage/object-not-found")) return "檔案路徑不存在（storage/object-not-found）";
  if(code.includes("storage/quota-exceeded")) return "Storage 額度已滿（storage/quota-exceeded）";
  if(code.includes("storage/retry-limit-exceeded")) return "上傳重試次數超過限制（storage/retry-limit-exceeded）";
  if(code.includes("storage/unknown")) return `Storage 未知錯誤（storage/unknown）${msg ? "：" + msg : ""}`;
  return `${code || "unknown"}${msg ? "：" + msg : ""}`;
}

async function uploadHandverPhoto(file){  const ext = (file.name && file.name.includes('.')) ? file.name.split('.').pop().toLowerCase() : 'jpg';
  const safeExt = ext.replace(/[^a-z0-9]/g,'') || 'jpg';
  const path = `handover_photos/${effectiveStore()}/${state.selectedDate}/${Date.now()}_${Math.random().toString(36).slice(2)}.${safeExt}`;

  let lastError = null;  for(const target of storageInstances){
    try{
      const photoRef = storageRef(target.instance, path);
      await uploadBytes(photoRef, file);      const url = await getDownloadURL(photoRef);      return url;
    }catch(error){
      console.error("Storage upload failed:", target.bucket, error);
      lastError = error;
    }
  }

  const fallbackRef = storageRef(storage, path);
  try{
    await uploadBytes(fallbackRef, file);    const url = await getDownloadURL(fallbackRef);    return url;
  }catch(error){
    console.error("Default storage upload failed:", error);
    lastError = error || lastError;
  }

  throw lastError || new Error("storage upload failed");
}
async function uploadHandverPhotos(files){
  const list = Array.from(files || []);
  const uploaded = [];
  for(const file of list){
    const url = await uploadHandverPhoto(file);
    uploaded.push({ url, name:file.name || "照片" });
  }
  return uploaded;
}

  return dashboardTargetStores().map(store => {
    const list = state.handovers.filter(h => h.date===state.selectedDate && h.storeId===store.id && (!state.selectedShift || h.shift===state.selectedShift));
    const total = list.length;
    const doneItems = list.filter(i => i.status==="done");
    const inProgressItems = list.filter(i => i.status==="in_progress");
    const pendingItems = list.filter(i => i.status==="pending");
    const followupItems = list.filter(i => i.status==="pending_followup");
    const done = doneItems.length;
    const inProgress = inProgressItems.length;
    const pending = pendingItems.length;
    const followup = followupItems.length;
    const abnormal = pending + inProgress + followup;
    const doneUnread = doneItems.filter(i => !itemReadByCurrentUser(i)).length;
    const inProgressUnread = inProgressItems.filter(i => !itemReadByCurrentUser(i)).length;
    const pendingUnread = pendingItems.filter(i => !itemReadByCurrentUser(i)).length;
    const followupUnread = followupItems.filter(i => !itemReadByCurrentUser(i)).length;
    return {...store,total,done,inProgress,pending,followup,abnormal,doneUnread,inProgressUnread,pendingUnread,followupUnread,progress: total?Math.round(done/total*100):0};
  });
}

const RELOAD_LOGIN_SESSION_KEY = "weather_reload_login_session_B613";
const RELOAD_LOGIN_FLAG_KEY = "weather_reload_in_progress_B613";
const RELOAD_LOGIN_MAX_AGE_MS = 12 * 60 * 60 * 1000;
function safeUserForReload(user){
  if(!user) return null;
  return { uid:String(user.uid || ""), email:String(user.email || "") };
}
function saveReloadLoginSession(user, profile){
  try{
    if(!user || !profile) return;
    localStorage.setItem(RELOAD_LOGIN_SESSION_KEY, JSON.stringify({
      user:safeUserForReload(user),
      profile:{...profile},
      tab:state.tab || "dashboard",
      selectedStore:state.selectedStore || "A",
      selectedDate:state.selectedDate || today(),
      savedAt:Date.now()
    }));
  }catch(e){}
}
function readReloadLoginSession(){
  try{
    const raw = localStorage.getItem(RELOAD_LOGIN_SESSION_KEY);
    if(!raw) return null;
    const data = JSON.parse(raw);
    if(!data || !data.user || !data.profile || !data.savedAt) return null;
    if(Date.now() - Number(data.savedAt) > RELOAD_LOGIN_MAX_AGE_MS) return null;
    return data;
  }catch(e){ return null; }
}
function clearReloadLoginSession(){
  try{
    localStorage.removeItem(RELOAD_LOGIN_SESSION_KEY);
    localStorage.removeItem(RELOAD_LOGIN_FLAG_KEY);
  }catch(e){}
}
function markReloadLoginInProgress(){
  try{
    if(state.currentUser && state.profile){
      saveReloadLoginSession(state.currentUser, state.profile);
      localStorage.setItem(RELOAD_LOGIN_FLAG_KEY, String(Date.now()));
    }
  }catch(e){}
}
function shouldSoftRestoreAfterReload(){
  try{
    const ts = Number(localStorage.getItem(RELOAD_LOGIN_FLAG_KEY) || 0);
    return ts && Date.now() - ts < 2 * 60 * 1000;
  }catch(e){ return false; }
}

async function ensureProfile(user, nameFromRegister=""){
  const ref = doc(db,"users",user.uid);
  const snap = await getDoc(ref);
  if(snap.exists()){
    const data = snap.data();
    if(data.pendingApproval){
      await signOut(auth);
      setState({loginError:"此帳號正在等待管理員審核。", profile:null, currentUser:null});
      return;
    }
    if(data.active===false){
      await signOut(auth);
      setState({loginError:"此帳號已被停用，請聯絡管理員。", profile:null, currentUser:null});
      return;
    }
    const nextProfile = {id:user.uid,...data,role:normalizeRole(data.role)};
    const nextStore = defaultDashboardStore(nextProfile);
    const loginToday = today();
    const loginShift = currentBusinessShift();
    setState({
      profile:nextProfile,
      selectedStore:nextStore,
      historyStore:nextStore,
      selectedDate:loginToday,
      historyDate:loginToday,
      newItemDate:loginToday,
      newItemShift:loginShift,
      selectedShift:"",
      historyShift:"",
      historyStatusFilter:"",
      formsStatusFilter:""
    });
    saveReloadLoginSession(user, nextProfile);
    await subscribeData();
    scheduleMobileHandoverSync('login');
    resetStoreSupervisorIdleLogout();
    setTimeout(maybePromptBiometricAfterLogin, 500);
    return;
  }
  const existing = await getDocs(collection(db,"users"));
  const firstUser = existing.size===0;
  const profile = {
    email:user.email, username:user.email, name:nameFromRegister || user.email.split("@")[0],
    role:firstUser?"admin":"store_supervisor", storeId:firstUser?null:"A", defaultStoreId:"A", active:true, createdAt:serverTimestamp()
  };
  await setDoc(ref, profile);
  const createdProfile = {id:user.uid,...profile,role:normalizeRole(profile.role)};
  setState({ profile:createdProfile, infoMessage:firstUser?"第一個註冊帳號已設為管理員。":"已註冊成功，預設為店主管 寶慶。" });
  saveReloadLoginSession(user, createdProfile);
  await subscribeData();
  scheduleMobileHandoverSync('login');
  resetStoreSupervisorIdleLogout();
  setTimeout(maybePromptBiometricAfterLogin, 500);
}

function subscribeData(){

  unsubscribers.push(onSnapshot(collection(db,"handovers"), snap => {
    setState({handovers:snap.docs.map(d=>({id:d.id,...d.data()})), handoverCalendarSyncedAt:new Date().toISOString()});
    if(shouldUseMobileHandoverSync()) setTimeout(()=>render(), 0);
  }));
  unsubscribers.push(onSnapshot(collection(db,"announcements"), snap => {

    rows.sort((a,b) => String(b.createdAt?.seconds||0).localeCompare(String(a.createdAt?.seconds||0)));
    setState({ announcements:rows, lastAnnouncement:rows[0]||null, showAnnouncementModal:false });
  }));
  unsubscribers.push(onSnapshot(collection(db,"users"), snap => setState({users:snap.docs.map(d=>({id:d.id,...d.data(),role:normalizeRole(d.data().role)}))})));
  unsubscribers.push(onSnapshot(collection(db,"applications"), snap => {
    const rows = snap.docs.map(d=>({id:d.id,...d.data()}));
    rows.sort((a,b) => String(b.createdAt?.seconds||0).localeCompare(String(a.createdAt?.seconds||0)));
    setState({applications:rows});
  }));
  unsubscribers.push(onSnapshot(collection(db,"stores"), async snap => {
    if(snap.empty){
      for(const s of storesSeed){
        await setDoc(doc(db,"stores",s.id), s, {merge:true});
      }
      setState({stores:storesSeed, storeDrafts:Object.fromEntries(storesSeed.map(s=>[s.id,s.name]))});
      return;
    }
    const rows = snap.docs.map(d => ({id:d.id,...d.data(), name: normalizeStoreName(d.id, d.data().name)})).sort((a,b)=>String(a.id).localeCompare(String(b.id)));
    setState({stores:rows, storeDrafts:Object.fromEntries(rows.map(s=>[s.id,normalizeStoreName(s.id, s.name)]))});
  }));
  return primePromise;
}

async function reviewApplication(uid, status){
  if(!canManageUsers()) return alert("只有管理員或店長可審核申請");
  const appRef = doc(db,"applications",uid);
  const userRef = doc(db,"users",uid);
  const appSnap = await getDoc(appRef);
  const userSnap = await getDoc(userRef);
  if(!appSnap.exists() || !userSnap.exists()) {
    setState({ applications:(state.applications || []).filter(app => app.id !== uid && app.uid !== uid) });
    return;
  }
  const appData = appSnap.data();
  const userData = userSnap.data();
  const payload = {
    status,
    reviewedByUid: currentUid() || null,
    reviewedByName: currentUserName(),
    updatedAt: serverTimestamp()
  };
  await setDoc(appRef, payload, {merge:true});
  const userUpdate = { applicationStatus:status, updatedAt:serverTimestamp() };
  if(status === "approved"){
    userUpdate.active = true;
    userUpdate.pendingApproval = false;
  }else if(status === "rejected"){
    userUpdate.active = false;
    userUpdate.pendingApproval = false;
  }else{
    userUpdate.active = false;
    userUpdate.pendingApproval = true;
  }
  await setDoc(userRef, userUpdate, {merge:true});
  alert(status === "approved" ? `已通過 ${appData.name || userData.name || userData.email} 的申請` : status === "rejected" ? `已標記 ${appData.name || userData.name || userData.email} 為不通過` : `已改為`);
}

  if(!canManageUsers()) return alert("只有管理員或店長可刪除申請");
  if(!uid) return;
  const target = (state.applications || []).find(app => String(app.id) === String(uid) || String(app.uid) === String(uid));
  const displayName = target?.name || target?.email || "這筆申請";
  if(!confirm(`確定要刪除 ${displayName} 的申請訊息嗎？\n\n無論資料庫是否仍存在，畫面都會移除這筆資料。`)) return;
  setState({ applications:(state.applications || []).filter(app => String(app.id) !== String(uid) && String(app.uid) !== String(uid)) });
  let deletedAny = false;
  try{
    const appRef = doc(db,"applications",uid);

    if(appSnap.exists()){

  try{

const GLOBAL_IDLE_LOGOUT_LIMIT_MS = 5 * 60 * 1000;
let storeSupervisorIdleTimer = null;
let storeSupervisorLastActivityAt = 0;
function isStoreSupervisorIdleLogoutTarget(){ return !!state.currentUser; }
function removeIdleLogoutToast(){ document.getElementById("idleLogoutToast")?.remove(); }
function showIdleLogoutToast(message){ removeIdleLogoutToast(); const toast = document.createElement("div"); toast.id = "idleLogoutToast"; toast.className = "idle-logout-toast"; toast.textContent = message; document.body.appendChild(toast); }
function stopStoreSupervisorIdleLogout(){ if(storeSupervisorIdleTimer){ clearTimeout(storeSupervisorIdleTimer); storeSupervisorIdleTimer = null; } removeIdleLogoutToast(); }
function resetStoreSupervisorIdleLogout(){
  if(!isStoreSupervisorIdleLogoutTarget()){ stopStoreSupervisorIdleLogout(); return; }
  if(storeSupervisorIdleTimer) clearTimeout(storeSupervisorIdleTimer);
  storeSupervisorIdleTimer = setTimeout(async () => {
    if(!isStoreSupervisorIdleLogoutTarget()) return stopStoreSupervisorIdleLogout();
    showIdleLogoutToast("帳號已閒置超過 5 分鐘，系統將自動登出。");
    try{ await logout(); setState({loginError:"帳號已閒置超過 5 分鐘，請重新登入。"}); }
    catch(e){ console.error("idle logout failed", e); }
  }, GLOBAL_IDLE_LOGOUT_LIMIT_MS);
}
function handleStoreSupervisorActivity(){
  if(!isStoreSupervisorIdleLogoutTarget()) return;
  const now = Date.now();
  if(now - storeSupervisorLastActivityAt < 1000) return;
  storeSupervisorLastActivityAt = now;
  resetStoreSupervisorIdleLogout();
}

async function createAdminManagedUser(){
  if(!canManageUsers()) return alert("只有管理員或店長可建立帳號");
  const email = String(state.adminNewEmail || "").trim();
  const name = String(state.adminNewName || "").trim();
  const role = normalizeRole(state.adminNewRole || "store_supervisor");
  const storeId = String(state.adminNewStore || "A").trim() || "A";
  const active = String(state.adminNewStatus || "true") !== "false";
  if(!email) return setState({adminCreateError:"請輸入 Email", adminCreateMessage:""});
  if(!/^\S+@\S+\.\S+$/.test(email)) return setState({adminCreateError:"Email 格式不正確", adminCreateMessage:""});
  if(!name) return setState({adminCreateError:"請輸入姓名", adminCreateMessage:""});
  if(!["admin","general_manager","store_supervisor"].includes(role)) return setState({adminCreateError:"角色只能選管理員、店長或店主管", adminCreateMessage:""});
  if(!canAssignRole(role)) return setState({adminCreateError:"店長不能建立管理員帳號", adminCreateMessage:""});
  const duplicate = state.users.find(u => !u.removed && String(u.email || u.username || "").toLowerCase() === email.toLowerCase());
  if(duplicate) return setState({adminCreateError:"此 Email 已存在於帳號列表", adminCreateMessage:""});
  if(!confirm(`確定要建立帳號？\n\n姓名：${name}\nEmail：${email}\n角色：${roleLabel(role)}\n\n建立後可立即按「寄重設信」讓對方自行設定密碼。`)) return;
  let secondaryApp = null;
  try{
    setState({adminCreateError:"", adminCreateMessage:"建立中，請稍候..."});
    secondaryApp = initializeApp(firebaseConfig, `adminCreateUser_${Date.now()}_${Math.random().toString(36).slice(2)}`);
    const secondaryAuth = getAuth(secondaryApp);
    secondaryAuth.languageCode = "zh-TW";
    const tempPassword = `Tmp${Math.random().toString(36).slice(2)}${Date.now()}!A1`;
    const cred = await createUserWithEmailAndPassword(secondaryAuth, email, tempPassword);
    const payload = {
      email,
      username: email,
      name,
      role,
      storeId: ["admin","general_manager"].includes(role) ? null : storeId,
      defaultStoreId: storeId,
      active,
      pendingApproval:false,
      applicationStatus:"approved",
      createdByUid: currentUid() || null,
      createdByName: currentUserName(),
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp()
    };
    await setDoc(doc(db,"users",cred.user.uid), payload, {merge:true});
    try{ await sendPasswordResetEmail(secondaryAuth, email); }catch(mailErr){ console.warn("create user reset email failed", mailErr); }
    try{ await signOut(secondaryAuth); }catch(_e){}
    await deleteApp(secondaryApp);
    secondaryApp = null;
    setState({
      adminNewEmail:"",adminNewName:"",adminNewRole:"store_supervisor",adminNewStore:"A",adminNewStatus:"true",
      adminCreateError:"",
      adminCreateMessage:`已建立 ${name}，並嘗試寄出密碼重設信。若未收到，也可以在列表按「寄重設信」重寄。`
    });
  }catch(e){
    console.error("create managed user failed:", e);
    let msg = "建立帳號失敗，請稍後再試。";
    const code = String(e?.code || "");
    if(code.includes("auth/email-already-in-use")) msg = "此 Email 已被 Firebase Authentication 使用。";
    else if(code.includes("auth/invalid-email")) msg = "Email 格式不正確。";
    else if(code.includes("permission-denied")) msg = "Firestore 權限不足，請檢查 Firebase 規則。";
    else if(e?.message) msg = e.message;
    setState({adminCreateError:msg, adminCreateMessage:""});
    if(secondaryApp){ try{ await deleteApp(secondaryApp); }catch(_e){} }
  }
}

// === B6.3.9 device biometric quick login helpers ===
// B6.3.9：快速登入必須經過 WebAuthn / Passkey 裝置驗證。
// 重點修正：不能只因為 localStorage 顯示已綁定就直接登入；每次快速登入都必須呼叫 navigator.credentials.get()。
function biometricStorageKey(email){
  const key = String(email || state.loginEmail || "default").trim().toLowerCase() || "default";
  return "weather_biometric_bound_" + key;
}
function biometricCredentialKey(email){
  const key = String(email || state.loginEmail || "default").trim().toLowerCase() || "default";
  return "weather_biometric_credential_" + key;
}
function biometricRememberedEmail(){
  try{return localStorage.getItem("weather_biometric_email") || "";}catch(e){return "";}
}
function biometricIsBound(){
  const email = String(state.loginEmail || biometricRememberedEmail() || "").trim().toLowerCase();
  if(!email) return false;
  try{return localStorage.getItem(biometricStorageKey(email)) === "1";}catch(e){return false;}
}
function biometricStoredCredential(email){
  try{
    const raw = localStorage.getItem(biometricCredentialKey(email));
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
function isMobileQuickLoginDevice(){
  const ua = navigator.userAgent || "";
  const uaDataMobile = !!(navigator.userAgentData && navigator.userAgentData.mobile);
  const mobileUA = /Android|iPhone|iPad|iPod|Mobile|Tablet/i.test(ua);
  const touchSmallScreen = (navigator.maxTouchPoints || 0) > 0 && Math.min(window.innerWidth || 9999, screen.width || 9999) <= 980;
  return uaDataMobile || mobileUA || touchSmallScreen;
}
function biometricDeviceTypeLabel(){
  const ua = navigator.userAgent || "";
  if(/iPhone|iPad|iPod/i.test(ua)) return "iPhone / iPad Face ID 或 Touch ID";
  if(/Android/i.test(ua)) return "Android 臉部或指紋";
  if(/Macintosh/i.test(ua)) return "Mac Touch ID / Passkey";
  if(/Windows/i.test(ua)) return "Windows Hello";
  return "裝置內建驗證";
}
function canUsePlatformBiometric(){
  return !!(window.PublicKeyCredential && navigator.credentials && PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable);
}
function scheduleBiometricSupportCheck(){
  if(!isMobileQuickLoginDevice()){
    state.biometricChecked = true;
    state.biometricSupported = false;
    state.biometricDeviceLabel = "行動裝置限定";
    return;
  }
  if(state.biometricChecked) return;
  state.biometricChecked = true;
  state.biometricDeviceLabel = biometricDeviceTypeLabel();
  if(!canUsePlatformBiometric()){
    state.biometricSupported = false;
    setTimeout(()=>setState({biometricSupported:false, biometricDeviceLabel:biometricDeviceTypeLabel()}),0);
    return;
  }
  PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().then(ok=>{
    setState({biometricSupported:!!ok, biometricDeviceLabel:biometricDeviceTypeLabel()});
  }).catch(()=>setState({biometricSupported:false, biometricDeviceLabel:biometricDeviceTypeLabel()}));
}
function biometricLoginPanelHtml(){
  if(!isMobileQuickLoginDevice()) return "";

      : "此裝置或瀏覽器不支援快速登入，請使用一般帳密登入。";

function bytesToBase64Url(bytes){
  const arr = bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes);
  let s = "";
  arr.forEach(b => s += String.fromCharCode(b));
  return btoa(s).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}
function base64UrlToBytes(str){
  str = String(str || "").replace(/-/g,"+").replace(/_/g,"/");
  while(str.length % 4) str += "=";
  const bin = atob(str);
  const out = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) out[i] = bin.charCodeAt(i);
  return out;
}
function randomChallenge(len=32){
  const b = new Uint8Array(len);
  if(window.crypto && crypto.getRandomValues) crypto.getRandomValues(b);
  else for(let i=0;i<len;i++) b[i] = Math.floor(Math.random()*256);
  return b;
}
async function createBiometricCredential(email){
  if(!canUsePlatformBiometric()){
    throw new Error("此裝置或瀏覽器不支援 Face ID / 指紋快速登入，請使用一般登入。");
  }
  const ok = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().catch(()=>false);
  if(!ok) throw new Error("目前裝置未啟用可用的臉部 / 指紋 / 螢幕鎖驗證。");
  const cleanEmail = String(email || "").trim().toLowerCase();
  if(!cleanEmail) throw new Error("找不到帳號 Email，請先完成一般登入。");
  const userBytes = new TextEncoder().encode(cleanEmail).slice(0,64);
  const credential = await navigator.credentials.create({
    publicKey:{
      challenge: randomChallenge(32),
      rp:{name:"天氣系統"},
      user:{id:userBytes, name:cleanEmail, displayName:cleanEmail},
      pubKeyCredParams:[
        {type:"public-key", alg:-7},
        {type:"public-key", alg:-257}
      ],
      authenticatorSelection:{
        authenticatorAttachment:"platform",
        userVerification:"required",
        residentKey:"preferred",
        requireResidentKey:false
      },
      timeout:60000,
      attestation:"none"
    }
  });
  if(!credential || !credential.rawId) throw new Error("未完成裝置驗證，快速登入未啟用。");
  const record = {
    id: credential.id,
    rawId: bytesToBase64Url(credential.rawId),
    type: credential.type,
    createdAt: Date.now(),
    device: biometricDeviceTypeLabel()
  };
  localStorage.setItem(biometricCredentialKey(cleanEmail), JSON.stringify(record));
  return record;
}
async function runDeviceVerification(email){
  // B6.3.9：每次快速登入都必須進入這裡，並呼叫 navigator.credentials.get()。
  const cleanEmail = String(email || biometricRememberedEmail() || state.loginEmail || "").trim().toLowerCase();
  const record = biometricStoredCredential(cleanEmail);
  if(!record || !record.rawId) throw new Error("此裝置尚未建立 Face ID / 指紋憑證，請先用 Email + 密碼登入一次並重新啟用快速登入。");
  if(!canUsePlatformBiometric()){
    throw new Error("此瀏覽器不支援裝置驗證，請使用 Email + 密碼登入。");
  }
  const ok = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().catch(()=>false);
  if(!ok) throw new Error("目前裝置無法執行 Face ID / 指紋驗證。");
  const assertion = await navigator.credentials.get({
    publicKey:{
      challenge: randomChallenge(32),
      allowCredentials:[{type:"public-key", id:base64UrlToBytes(record.rawId)}],
      userVerification:"required",
      timeout:60000
    }
  });
  if(!assertion || !assertion.rawId) throw new Error("未完成 Face ID / 指紋驗證。");
  return true;
}
function biometricSessionStorageKey(email){
  return "weather_biometric_session_" + String(email || "").trim().toLowerCase();
}
function saveBiometricLocalSession(email){
  try{
    const cleanEmail = String(email || "").trim().toLowerCase();
    if(!cleanEmail) return;
    const payload = {
      email: cleanEmail,
      uid: String((state.currentUser && state.currentUser.uid) || ""),
      profile: state.profile || null,
      savedAt: Date.now()
    };
    localStorage.setItem(biometricSessionStorageKey(cleanEmail), JSON.stringify(payload));
  }catch(e){}
}
function loadBiometricLocalSession(email){
  try{
    const cleanEmail = String(email || "").trim().toLowerCase();
    if(!cleanEmail) return null;
    const raw = localStorage.getItem(biometricSessionStorageKey(cleanEmail));
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
async function enterAfterBiometricVerification(email){
  const cleanEmail = String(email || biometricRememberedEmail() || "").trim().toLowerCase();
  if(!cleanEmail) throw new Error("找不到已綁定帳號，請先用 Email + 密碼登入一次。");
  if(auth && auth.currentUser && String(auth.currentUser.email || "").trim().toLowerCase() === cleanEmail){
    await ensureProfile(auth.currentUser);
    setState({loginError:"", infoMessage:"Face ID / 指紋驗證成功，已快速登入。", publicGateStage:0, showBiometricUpgrade:false});
    return;
  }
  const saved = loadBiometricLocalSession(cleanEmail);
  if(saved && saved.profile){
    const user = {uid: saved.uid || cleanEmail, email: cleanEmail};
    const profile = {...saved.profile, email: saved.profile.email || cleanEmail};
    setState({currentUser:user, profile, loginEmail:cleanEmail, loginPassword:"", loginError:"", infoMessage:"Face ID / 指紋驗證成功，已快速登入。", publicGateStage:0, showBiometricUpgrade:false});
    return;
  }
  throw new Error("Face ID / 指紋驗證成功，但找不到可登入的本機帳號資料。請先用 Email + 密碼登入一次，完成後即可快速登入。");
}
window.enableBiometricFromUI = async function(){
  try{
    const email = String((state.currentUser && state.currentUser.email) || state.loginEmail || biometricRememberedEmail() || "").trim().toLowerCase();
    if(!email) throw new Error("找不到帳號 Email，請先完成一般登入。");

window.openBiometricExplainFromUI = function(){ alert("快速登入會依目前裝置自動判斷：手機 / 平板支援 Face ID / 指紋才顯示；電腦版網頁不顯示快速登入，請使用 Email + 密碼登入。B6.3.9 起，每次快速登入都必須先完成裝置驗證，不能直接跳過。") };
window.unbindBiometricFromUI = function(){

      alert("目前沒有找到已綁定的帳號紀錄。");

    setState({loginEmail: email, loginPassword:"", loginError:"", infoMessage:"已解除此裝置 Face ID / 指紋快速登入綁定，請使用 Email + 密碼登入；登入成功後可重新綁定。", showBiometricUpgrade:false, biometricPromptDismissed:false});
  }catch(e){

window.biometricQuickLoginFromUI = async function(){

function isVideoAttachment(url="", mediaType="", mediaName=""){
  const type = String(mediaType || "").toLowerCase();
  const target = `${url || ""} ${mediaName || ""}`.toLowerCase();

}
function mediaListFromItem(item){

  const types = Array.isArray(item?.mediaTypes) && item.mediaTypes.length ? item.mediaTypes : (item?.mediaType ? [item.mediaType] : []);

function monthLabelFromDate(value){

  return `${d.getFullYear()}年 ${d.getMonth()+1}月`;
}
function addMonths(value, diff){
  const d = value ? new Date(value) : new Date();
  if(Number.isNaN(d.getTime())) return today();
  d.setMonth(d.getMonth()+diff);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(Math.min(d.getDate(), 28)).padStart(2,"0")}`;
}
function isCompletedHandoverStatus(status){

function markerShouldIncludeStore(h, storeId){

}
function handoversOnDate(dateValue, storeId){

}
function handoverDateStatusClass(dateValue, storeId){
  // B6.3.9：日期三色規則：白色＝無事件；淺黃色＝有事件且全部已處理；紅色＝有事件尚未處理完成。

function calendarDateValue(year, month, day){

function datePickerHtml(target, value, align="right"){

function dateFromYearMonthKeepingDay(target, year, month){
  const current = target === "historyDate" ? (state.historyDate || today()) : (state.selectedDate || state.newItemDate || today());

  const maxDay = new Date(Number(year), Number(month), 0).getDate();
  return `${year}-${String(month).padStart(2,"0")}-${String(Math.min(keepDay, maxDay)).padStart(2,"0")}`;
}


function ymFromDate(value){
  const v = String(value || today());
  return /^\d{4}-\d{2}/.test(v) ? v.slice(0,7) : today().slice(0,7);
}
function daysInMonthFromYM(ym){
  const [y,m] = String(ym || ymFromDate(today())).split("-").map(Number);
  return new Date(y, m, 0).getDate();
}
function buildDateFromYMDay(ym, day){
  return `${ym}-${String(day).padStart(2,"0")}`;
}
function normalizeMonthText(value){
  const raw = String(value || "").trim();
  const digits = raw.replace(/\D/g, "");
  let y = "", m = "";
  if(/^\d{4}[-\/]\d{1,2}$/.test(raw)){
    const parts = raw.split(/[-\/]/); y = parts[0]; m = parts[1];
  }else if(digits.length >= 6){
    y = digits.slice(0,4); m = digits.slice(4,6);
  }
  if(!y || !m) return "";
  const year = Number(y), month = Number(m);
  if(year < 1900 || year > 2999 || month < 1 || month > 12) return "";
  return `${String(year).padStart(4,"0")}-${String(month).padStart(2,"0")}`;
}
function normalizeDateText(value){
  const raw = String(value || "").trim();
  const digits = raw.replace(/\D/g, "");
  let y = "", m = "", d = "";
  if(/^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}$/.test(raw)){
    const parts = raw.split(/[-\/]/); y = parts[0]; m = parts[1]; d = parts[2];
  }else if(digits.length >= 8){
    y = digits.slice(0,4); m = digits.slice(4,6); d = digits.slice(6,8);
  }
  if(!y || !m || !d) return "";
  const year = Number(y), month = Number(m), day = Number(d);
  if(year < 1900 || year > 2999 || month < 1 || month > 12) return "";
  const max = new Date(year, month, 0).getDate();
  if(day < 1 || day > max) return "";
  return `${String(year).padStart(4,"0")}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
}
function formatDateTyping(value){
  const digits = String(value || "").replace(/\D/g, "").slice(0,8);
  if(digits.length <= 4) return digits;
  if(digits.length <= 6) return `${digits.slice(0,4)}/${digits.slice(4)}`;
  return `${digits.slice(0,4)}/${digits.slice(4,6)}/${digits.slice(6)}`;
}
function formatMonthTyping(value){
  // 支援 KEY 202604，也支援原版顯示 2026年04月；輸入中只格式化，不重繪月曆。
  const digits = String(value || "").replace(/\D/g, "").slice(0,6);
  if(digits.length <= 4) return digits;
  return `${digits.slice(0,4)}年${digits.slice(4)}月`;
}
function applyMonthTextInput(el){
  const ymValue = normalizeMonthText(el?.value);

  const max = daysInMonthFromYM(ymValue);
  const date = buildDateFromYMDay(ymValue, Math.min(day, max));
  setState({newItemDate:date, selectedDate:date});

function applyDateTextInput(el){

}

function changeNewItemMonth(diff){
  const current = state.newItemDate || state.selectedDate || today();
  const base = new Date(current + "T00:00:00");
  const safe = Number.isNaN(base.getTime()) ? new Date() : base;
  const originalDay = Number(String(current).slice(8,10)) || 1;
  safe.setMonth(safe.getMonth() + diff, 1);
  const maxDay = new Date(safe.getFullYear(), safe.getMonth()+1, 0).getDate();
  const next = calendarDateValue(safe.getFullYear(), safe.getMonth(), Math.min(maxDay, originalDay));
  setState({ newItemDate: next, selectedDate: next });
}

function applicationStatusMeta(status){
  if(status === "approved") return {label:"通過", cls:"ok"};
  if(status === "rejected") return {label:"不通過", cls:"warn"};
  return {label:"待審核", cls:"neutral"};
}

function applicationList(){
  const appMap = new Map();
  (state.applications || []).forEach(app => {
    if(app?.id) appMap.set(String(app.id), {id:String(app.id), ...app});
  });
  (state.users || []).forEach(user => {
    const isPending = user?.pendingApproval || user?.applicationStatus === "pending";
    if(!user?.id || user?.removed || !isPending) return;
    if(appMap.has(String(user.id))) return;
    appMap.set(String(user.id), {
      id: String(user.id),
      uid: String(user.id),
      email: user.email || user.username || "",
      name: user.name || "",
      status: user.applicationStatus || "pending",
      createdAt: user.createdAt || user.updatedAt || null,
      updatedAt: user.updatedAt || user.createdAt || null,
      reviewedByName: user.reviewedByName || "",
      fallbackFromUsers: true
    });
  });
  return Array.from(appMap.values()).sort((a,b) => {
    const aSec = Number(a?.updatedAt?.seconds || a?.createdAt?.seconds || 0);
    const bSec = Number(b?.updatedAt?.seconds || b?.createdAt?.seconds || 0);
    return bSec - aSec;
  });
}

window.monthKeyInputKeydown = function(e, target){

    const current = target === "historyDate" ? (state.historyDate || today()) : (state.selectedDate || state.newItemDate || today());
    const ym = ymFromDate(current);
    const [y,m] = ym.split("-");

    if(yearEl) yearEl.value = y;
    if(monthEl) monthEl.value = m;

  }
};
window.applyMonthYearFromUI = function(target, force){
  const yearEl = document.getElementById(`${target}Year`);
  const monthEl = document.getElementById(`${target}Month`);
  if(!yearEl || !monthEl) return;
  const rawYear = String(yearEl.value || "").replace(/\D/g, "");
  const rawMonth = String(monthEl.value || "").replace(/\D/g, "");
  if(!force && (rawYear.length < 4 || rawMonth.length < 1)) return;
  let year = Number(rawYear);
  let month = Number(rawMonth);
  const fallback = ymFromDate(target === "historyDate" ? (state.historyDate || today()) : (state.selectedDate || state.newItemDate || today())).split("-");
  if(!year || rawYear.length < 4) year = Number(fallback[0]) || new Date().getFullYear();
  if(!month) month = Number(fallback[1]) || 1;
  month = Math.max(1, Math.min(12, month));
  year = Math.max(1900, Math.min(2999, year));
  yearEl.value = String(year);
  monthEl.value = String(month).padStart(2,"0");
  const nextDate = dateFromYearMonthKeepingDay(target, year, month);
  const current = target === "historyDate" ? state.historyDate : (target === "dateInput" ? state.selectedDate : state.newItemDate);
  const hidden = document.getElementById(target);
  if(hidden) hidden.value = nextDate;
  if(String(current || "") === nextDate) return;
  if(target === "historyDate") setState({historyDate:nextDate, selectedDate:nextDate, newItemDate:nextDate, formsMonthMode:false, openCalendar:""});
  else if(target === "dateInput") applyDashboardDateSearch(nextDate);
  else setState({newItemDate:nextDate, selectedDate:nextDate, historyDate:nextDate, formsMonthMode:false, openCalendar:""});
};
window.updateMonthYearFromUI = function(target){ applyMonthYearFromUI(target, true); };

};

let businessDateSyncState = { date: today(), shift: currentBusinessShift() };
function syncBusinessDateAndShiftIfNeeded(){
  const nextDate = today();
  const nextShift = currentBusinessShift();
  const prevDate = businessDateSyncState.date;
  const prevShift = businessDateSyncState.shift;
  if(nextDate === prevDate && nextShift === prevShift) return;
  businessDateSyncState = { date: nextDate, shift: nextShift };
  if(!state.currentUser || !state.profile) return;
  const patch = {};
  if(!state.newItemDate || state.newItemDate === prevDate) patch.newItemDate = nextDate;
  if(!state.selectedDate || state.selectedDate === prevDate) patch.selectedDate = nextDate;
  if(!state.historyDate || state.historyDate === prevDate) patch.historyDate = nextDate;
  if(!state.newItemShift || state.newItemShift === prevShift) patch.newItemShift = nextShift;
  if(Object.keys(patch).length) setState(patch);
}
setInterval(syncBusinessDateAndShiftIfNeeded, 60 * 1000);


function handoverRecordTimeValue(item){
  const candidates = [item.updatedAt, item.createdAt];
  for(const value of candidates){
    if(!value) continue;
    if(typeof value.toMillis === "function") return value.toMillis();
    if(typeof value.seconds === "number") return value.seconds * 1000;
    const parsed = Date.parse(value);
    if(!Number.isNaN(parsed)) return parsed;
  }
  const fallback = Date.parse(`${item.date || today()}T23:59:59`);
  return Number.isNaN(fallback) ? 0 : fallback;
}
function newestHandoverRecord(list){
  return [...(list || [])].sort((a,b) => handoverRecordTimeValue(b) - handoverRecordTimeValue(a))[0] || null;
}

async function refreshLatestHandoverFromUI(){
  const btn = document.getElementById("handoverLatestSearchBtn");
  const oldText = btn ? btn.innerHTML : "";
  const query = applyHandoverQueryControlsPatch();
  const keepDate = query.date || state.newItemDate || state.selectedDate || today();
  const targetStore = query.store || state.selectedStore || effectiveStore() || defaultDashboardStore();
  if(btn){ btn.disabled = true; btn.innerHTML = "搜尋中..."; }
  try{
    const [handoverSnap, userSnap, storeSnap] = await Promise.all([
      getDocs(collection(db,"handovers")),
      getDocs(collection(db,"users")),
      getDocs(collection(db,"stores"))
    ]);
    const handovers = handoverSnap.docs.map(d=>({id:d.id,...d.data()}));

async function forceMobileHandoverSync(reason='manual'){
  if(!state.currentUser && !state.profile) return;
  const now = Date.now();
  if(mobileHandoverSyncInFlight) return;
  if(reason !== 'login' && reason !== 'forms-enter' && now - lastMobileHandoverSyncAt < 900) return;
  mobileHandoverSyncInFlight = true;
  lastMobileHandoverSyncAt = now;
  document.body?.classList?.add('mobile-syncing');
  try{
    const [handoverSnap, userSnap, storeSnap] = await Promise.all([
      getDocs(collection(db,'handovers')),
      getDocs(collection(db,'users')),
      getDocs(collection(db,'stores'))
    ]);
    const patch = {
      handovers: handoverSnap.docs.map(d=>({id:d.id,...d.data()})),
      users: userSnap.docs.map(d=>({id:d.id,...d.data(),role:normalizeRole(d.data().role)})),
      handoverMobileSyncedAt:new Date().toISOString(),
      handoverMobileSyncReason:reason
    };
    const stores = storeSnap.docs.map(d=>({id:d.id,...d.data(), name: normalizeStoreName(d.id, d.data().name)})).sort((a,b)=>String(a.id).localeCompare(String(b.id)));
    if(stores.length){
      patch.stores = stores;
      patch.storeDrafts = Object.fromEntries(stores.map(row => [row.id, normalizeStoreName(row.id, row.name)]));
    }
    setState(patch);
    setTimeout(()=>{
      const el = document.querySelector('.month-days-strip') || document.querySelector('.date-calendar') || document.getElementById('formsSection') || document.getElementById('dashboardFilterBar');
      if(el){ el.classList.add('mobile-sync-flash'); setTimeout(()=>el.classList.remove('mobile-sync-flash'), 800); }
    }, 0);
  }catch(e){
    console.error('B6.3.9 手機即時同步交接資料失敗', e);
  }finally{
    mobileHandoverSyncInFlight = false;
    setTimeout(()=>document.body?.classList?.remove('mobile-syncing'), 250);
  }
}
function scheduleMobileHandoverSync(reason='schedule'){
  if(!shouldUseMobileHandoverSync()) return;
  [0, 350, 1200, 2600].forEach((delay, index)=>{
    setTimeout(()=>forceMobileHandoverSync(index===0 ? reason : reason + '-' + index), delay);
  });
}

<script>
(function(){
  function getEmailFromBlock(el){
    const text = (el && el.textContent) ? el.textContent : "";
    const m = text.match(/[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/i);
    return m ? m[0].toLowerCase() : "";
  }

  function clearLocalResidue(email){
    try{
      const keys = ["pendingAccountRequests","applications","accountApplications","users"];
      keys.forEach(key=>{
        const raw = localStorage.getItem(key);
        if(!raw) return;
        const val = JSON.parse(raw);
        if(Array.isArray(val)){
          localStorage.setItem(key, JSON.stringify(val.filter(x=>{
            const xEmail = String(x.email || x.account || "").toLowerCase();
            const status = String(x.status || x.applicationStatus || "");
            return !(xEmail === email && (status.includes("待") || status === "" || status.includes("審核")));
          })));
        }
      });
    }catch(e){}
  }

  function removeVisibleResidue(email){
    if(!email) return;
    document.querySelectorAll(".item,.card,tr").forEach(el=>{
      const text = (el.textContent || "").toLowerCase();
      if(text.includes(email) && (text.includes("待審核") || text.includes("通過") || text.includes("不通過"))){
        const block = el.closest(".item") || el;
        if(block && block.parentElement) block.remove();
      }
    });
  }

  document.addEventListener("click", function(e){
    const btn = e.target.closest("button");
    if(!btn) return;
    const label = (btn.textContent || "").trim();
    if(label !== "通過" && label !== "不通過") return;

    const block = btn.closest(".item,.card,tr") || btn.parentElement;
    const email = getEmailFromBlock(block);
    setTimeout(()=>{
      clearLocalResidue(email);
      removeVisibleResidue(email);
      location.reload();
    }, 900);
  }, true);
})();
</script>

<script>
/* === B6.3.9 safe total card click behavior === */
(function(){
  let isJumping = false;

  function normalizeDate(v){
    return (v || '').replaceAll('/','-');
  }

  function getSelectedDate(){
    const inputs = Array.from(document.querySelectorAll('input[type="date"]'));
    const visible = inputs.find(el => el.offsetParent !== null && el.value);
    if (visible) return normalizeDate(visible.value);
    const any = inputs.find(el => el.value);
    if (any) return normalizeDate(any.value);
    const txt = document.body.innerText || '';
    const m = txt.match(/20\d{2}[-\/]\d{2}[-\/]\d{2}/);
    return m ? normalizeDate(m[0]) : '';
  }

  function setDateInputs(date){
    if(!date) return;
    document.querySelectorAll('input[type="date"]').forEach(el => {
      if (!el.disabled) {
        el.value = date;
        el.dispatchEvent(new Event('input', {bubbles:true}));
        el.dispatchEvent(new Event('change', {bubbles:true}));
      }
    });
  }

  function findTargetSection(){
    const all = Array.from(document.querySelectorAll('.section,.card,section,div'));
    return all.find(el => /交接查詢/.test(el.textContent || '')) ||
           all.find(el => /各店進度/.test(el.textContent || '')) ||
           all.find(el => /目前結果|搜尋交接內容|全部狀態/.test(el.textContent || ''));
  }

  window.safeJumpToHandoverItemsByTotal = function(e){
    if(e) e.preventDefault();
    if(isJumping) return;
    isJumping = true;

    const date = getSelectedDate();
    setDateInputs(date);

    const target = findTargetSection();
    if(target){
      target.scrollIntoView({behavior:'smooth', block:'start'});
      target.classList.add('handover-focus-flash');
      setTimeout(() => target.classList.remove('handover-focus-flash'), 1800);
    }

    setTimeout(() => { isJumping = false; }, 900);
  };

  function setupOnce(){
    const candidates = Array.from(document.querySelectorAll('.stat,.card,.item,div'));
    const card = candidates.find(el => {
      if(el.dataset.safeTotalLink === '1') return true;
      const text = (el.textContent || '').replace(/\s+/g,'');
      const rect = el.getBoundingClientRect();
      return text.includes('交接總數') && rect.width >= 120 && rect.height >= 70 && rect.width <= 420;
    });
    if(!card || card.dataset.safeTotalLink === '1') return;

    card.dataset.safeTotalLink = '1';
    card.classList.add('stat-card-clickable');
    card.setAttribute('role','button');
    card.setAttribute('tabindex','0');
    card.setAttribute('title','點擊查看該日期的交接事項');
    card.addEventListener('click', window.safeJumpToHandoverItemsByTotal);
    card.addEventListener('keydown', function(e){
      if(e.key === 'Enter' || e.key === ' ') window.safeJumpToHandoverItemsByTotal(e);
    });
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', setupOnce, {once:true});
  } else {
    setupOnce();
  }
})();
/* === end B6.3.9 safe total card click behavior === */
</script>


<script>
/* === B6.3.9 direct dashboard total link behavior === */
function jumpDashboardTotalToAllItems(e){
  if(e) {
    e.preventDefault();
    e.stopPropagation();
  }

  const normalize = (v) => (v || '').replaceAll('/','-');

  const dateText = (document.body.innerText || '').match(/20\d{2}[-\/]\d{2}[-\/]\d{2}/);
  let selectedDate = '';
  const dateInputs = Array.from(document.querySelectorAll('input[type="date"]'));
  const visibleDate = dateInputs.find(el => el.offsetParent !== null && el.value);
  if (visibleDate) selectedDate = normalize(visibleDate.value);
  else if (dateInputs[0] && dateInputs[0].value) selectedDate = normalize(dateInputs[0].value);
  else if (dateText) selectedDate = normalize(dateText[0]);

  // 切到交接頁籤
  const tabs = Array.from(document.querySelectorAll('button,.navbtn,a,[role="button"]'));
  const handoverTab = tabs.find(el => (el.textContent || '').trim() === '交接');
  if (handoverTab) handoverTab.click();

  setTimeout(() => {
    // 將查詢區日期帶成總覽日期
    if (selectedDate) {
      document.querySelectorAll('input[type="date"]').forEach(el => {
        if (!el.disabled) {
          el.value = selectedDate;
          el.dispatchEvent(new Event('input', {bubbles:true}));
          el.dispatchEvent(new Event('change', {bubbles:true}));
        }
      });
    }

    // 顯示全部事項、全部狀態、全部已讀條件
    const selects = Array.from(document.querySelectorAll('select'));
    selects.forEach(sel => {
      const opts = Array.from(sel.options || []);
      const allOpt = opts.find(o => /全部事項|全部狀態|全部班別|全部/.test(o.textContent || ''));
      if (allOpt) {
        sel.value = allOpt.value;
        sel.dispatchEvent(new Event('change', {bubbles:true}));
      }
    });

    // 優先找交接查詢區
    const nodes = Array.from(document.querySelectorAll('.section,.card,section,div'));
    const target = nodes.find(el => /交接查詢/.test(el.textContent || '')) ||
                   nodes.find(el => /目前結果/.test(el.textContent || '')) ||
                   nodes.find(el => /搜尋交接內容/.test(el.textContent || '')) ||
                   nodes.find(el => /各店進度/.test(el.textContent || ''));

    if (target) {
      target.scrollIntoView({behavior:'smooth', block:'start'});
      target.classList.add('handover-jump-focus');
      setTimeout(() => target.classList.remove('handover-jump-focus'), 2500);
    }
  }, 250);
}

document.addEventListener('keydown', function(e){
  const el = e.target;
  if(el && el.classList && el.classList.contains('total-handover-link') && (e.key === 'Enter' || e.key === ' ')){
    jumpDashboardTotalToAllItems(e);
  }
});
/* === end B6.3.9 direct dashboard total link behavior === */
</script>


<script>
/* === B6.3.9 click delegate fallback only === */
document.addEventListener('click', function(e){
  const card = e.target.closest('.total-handover-link, .stat, .card, .item');
  if(!card) return;
  const text = (card.textContent || '').replace(/\s+/g,'');
  const rect = card.getBoundingClientRect();
  if(text.includes('交接總數') && rect.width <= 500 && rect.height <= 220){
    jumpDashboardTotalToAllItems(e);
  }
}, true);
/* === end B6.3.9 click delegate fallback only === */
</script>


<script>
/* === B6.3.9 scoped handover status dropdown visual enhancer === */
(function(){
  const yellowStatuses = ['待處理','處理中','待追蹤'];
  const doneStatuses = ['已處理'];

  function textOf(el){ return (el && (el.textContent || el.value) || '').trim(); }
  function selectedStatusText(sel){
    if(!sel) return '';
    const opt = sel.options && sel.selectedIndex >= 0 ? sel.options[sel.selectedIndex] : null;
    const labelByValue = { pending:'待處理', in_progress:'處理中', pending_followup:'待追蹤', done:'已處理' };
    return (opt && (opt.textContent || opt.innerText) || labelByValue[sel.value] || sel.value || '').trim();
  }

  function applySelectStyle(sel){
    const value = selectedStatusText(sel);
    sel.classList.remove('status-yellow','status-white');
    sel.removeAttribute('data-current-status');
    if (doneStatuses.includes(value)){
      sel.classList.add('status-white');
      sel.setAttribute('data-current-status', value);
    } else if (yellowStatuses.includes(value)){
      sel.classList.add('status-yellow');
      sel.setAttribute('data-current-status', value);
    }
  }

  function applyChipStyle(el){
    const t = textOf(el);
    if (!t) return;
    if (doneStatuses.includes(t)){
      el.style.background = '#ffffff';
      el.style.color = '#111827';
      el.style.border = '2px solid #9ca3af';
      el.style.fontWeight = '900';
      el.style.boxShadow = '0 1px 2px rgba(15,23,42,.08)';
    } else if (yellowStatuses.includes(t)){
      el.style.background = '#fef3c7';
      el.style.color = '#111827';
      el.style.border = '2px solid #f59e0b';
      el.style.fontWeight = '900';
      el.style.boxShadow = '0 2px 5px rgba(245,158,11,.18)';
    }
  }

  function applyStatCardStyle(card){
    const t = textOf(card).replace(/\s+/g,'');
    card.classList.remove('status-yellow-card','status-white-card');
    if (/已處理/.test(t) && !/處理中|待追蹤|待處理/.test(t)){
      card.classList.add('status-white-card');
    } else if (/處理中|待追蹤|待處理/.test(t)){
      card.classList.add('status-yellow-card');
    }
  }

  function enhanceStatusStyles(){
    document.querySelectorAll('select.handover-status-select').forEach(sel => {
      applySelectStyle(sel);
      if(!sel.dataset.statusEnhanceReady){
        sel.dataset.statusEnhanceReady = '1';
        sel.addEventListener('change', () => applySelectStyle(sel));
        sel.addEventListener('input', () => applySelectStyle(sel));
      }
    });

    document.querySelectorAll('.chip,.badge,span,button').forEach(el => {
      const t = textOf(el);
      if (doneStatuses.includes(t) || yellowStatuses.includes(t)) applyChipStyle(el);
    });

    document.querySelectorAll('.stat').forEach(el => {
      const t = textOf(el);
      if (/已處理|處理中|待追蹤|待處理/.test(t)) applyStatCardStyle(el);
    });
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', enhanceStatusStyles, {once:true});
  } else {
    enhanceStatusStyles();
  }

  let timer = null;
  const mo = new MutationObserver(() => {
    clearTimeout(timer);
    timer = setTimeout(enhanceStatusStyles, 80);
  });
  mo.observe(document.documentElement, {childList:true, subtree:true});
})();
/* === end B6.3.9 scoped handover status dropdown visual enhancer === */
</script>

<script>
/* === B6.3.9 hide only store progress section for admin and manager === */
(function(){
  function currentRoleText(){
    const txt = document.body ? (document.body.innerText || "") : "";
    if(/\b管理員\b/.test(txt) || /祥A管理員|祥Ａ管理員|管理員/.test(txt)) return "admin";
    if(/\b店長\b/.test(txt)) return "general_manager";
    return "";

  function hideOnlyStoreProgressSection(){
    const role = currentRoleText();
    if(role !== "admin" && role !== "general_manager") return;
    const headings = Array.from(document.querySelectorAll("h2"));
    headings.forEach(h => {
      if((h.textContent || "").trim() === "各店進度"){
        const section = h.closest(".section");
        if(section){
          section.style.display = "none";
          section.setAttribute("data-hidden-store-progress", "1");
        }
      }
    });
  }
  document.addEventListener("DOMContentLoaded", hideOnlyStoreProgressSection);
  setInterval(hideOnlyStoreProgressSection, 700);
})();
/* === end B6.3.9 store progress section hide === */
</script>

<script>
/* B6.3.9：登出後強制重新輸入帳號密碼，並盡量阻止瀏覽器自動帶入 */
(function(){
  function disableCredentialRemember(){
    try {
      document.querySelectorAll('form').forEach(function(form){
        form.setAttribute('autocomplete','off');
        form.setAttribute('data-lpignore','true');
        form.setAttribute('data-1p-ignore','true');
      });
      document.querySelectorAll('input').forEach(function(input){
        var type = (input.getAttribute('type') || '').toLowerCase();
        var name = (input.getAttribute('name') || '').toLowerCase();
        var id = (input.getAttribute('id') || '').toLowerCase();
        var ph = (input.getAttribute('placeholder') || '').toLowerCase();
        var text = name + ' ' + id + ' ' + ph;
        if(type === 'password' || /user|account|login|mail|email|帳號|密碼|password|username/.test(text)){
          input.setAttribute('autocomplete','new-password');
          input.setAttribute('autocorrect','off');
          input.setAttribute('autocapitalize','off');
          input.setAttribute('spellcheck','false');
          input.setAttribute('data-lpignore','true');
          input.setAttribute('data-1p-ignore','true');
          input.setAttribute('data-form-type','other');
        }
      });
    } catch(e) {}
  }

  function clearCredentialFields(){
    try {
      document.querySelectorAll('input').forEach(function(input){
        var type = (input.getAttribute('type') || '').toLowerCase();
        var name = (input.getAttribute('name') || '').toLowerCase();
        var id = (input.getAttribute('id') || '').toLowerCase();
        var ph = (input.getAttribute('placeholder') || '').toLowerCase();
        var text = name + ' ' + id + ' ' + ph;
        if(type === 'password' || /user|account|login|mail|email|帳號|密碼|password|username/.test(text)){
          input.value = '';
          input.defaultValue = '';
        }
      });
    } catch(e) {}
  }

  function clearLoginStorage(){
    try {
      ['remember','rememberMe','savedAccount','savedUser','loginAccount','account','username','userName','password','loginPassword','currentUser','authUser','sessionUser'].forEach(function(k){
        localStorage.removeItem(k);
        sessionStorage.removeItem(k);
      });
    } catch(e) {}
  }

  window.forceFreshLogin = function(){
    clearLoginStorage();
    clearCredentialFields();
    disableCredentialRemember();
  };

  document.addEventListener('click', function(e){
    var btn = e.target.closest && e.target.closest('button,.btn,[role="button"],a');
    if(!btn) return;
    var t = (btn.textContent || '').trim();
    if(/登出|退出|Logout|Sign out/i.test(t)){
      setTimeout(window.forceFreshLogin, 50);
      setTimeout(window.forceFreshLogin, 300);
      setTimeout(window.forceFreshLogin, 1000);
    }
  }, true);

  disableCredentialRemember();
  clearCredentialFields();
  document.addEventListener('DOMContentLoaded', function(){
    disableCredentialRemember();
    clearCredentialFields();
  });
  window.addEventListener('pageshow', function(){
    disableCredentialRemember();
    clearCredentialFields();
  });
  setTimeout(disableCredentialRemember, 300);
  setTimeout(clearCredentialFields, 500);
  setTimeout(disableCredentialRemember, 1500);
})();
</script>

<script>
/* === B6.3.9 mobile pull-to-refresh guard + login persistence === */
(function(){
  var startY = 0;
  var tracking = false;
  function isEditable(el){
    if(!el) return false;
    var tag = (el.tagName || '').toLowerCase();
    return tag === 'input' || tag === 'textarea' || tag === 'select' || el.isContentEditable;
  }
  window.addEventListener('touchstart', function(e){
    if(!e.touches || !e.touches.length) return;
    startY = e.touches[0].clientY;
    tracking = window.scrollY <= 0;
  }, {passive:true, capture:true});
  window.addEventListener('touchmove', function(e){
    if(!tracking || !e.touches || !e.touches.length) return;
    if(isEditable(e.target)) return;
    var currentY = e.touches[0].clientY;
    var pullingDownAtTop = window.scrollY <= 0 && currentY > startY + 8;
    if(pullingDownAtTop){ e.preventDefault(); }
  }, {passive:false, capture:true});
  try{ sessionStorage.setItem('weather_mobile_pull_refresh_guard','B6.3.9'); }catch(e){}
})();
/* === end B6.3.9 mobile pull-to-refresh guard === */
</script>
