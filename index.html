    try{
      var sidebar=document.querySelector('.sidebar');

      if(!dash){
        dash=document.createElement('button');
        dash.className='navbtn';

      }
      var badge=sidebar.querySelector('.sidebar-version-badge');

      if(window.state && state.tab === 'dashboard'){
        dash.classList.add('active');
      }
    }catch(e){}
  }
  var oldSwitch=window.switchTab;
  Object.defineProperty(window,'switchTab',{
    configurable:true,
    get:function(){return oldSwitch;},

      oldSwitch=function(tab){ window.__USER_SWITCHED_TAB_792__=true; return fn.apply(this,arguments); };

  const BLOCK_ROLES = ["admin"];

  function isProtectedUser(data){
    if(!data) return false;
    return BLOCK_IDS.includes(String(data.username || "").toLowerCase())
      || BLOCK_ROLES.includes(String(data.role || "").toLowerCase());
  }

      return true;
    }
    return false;
  };

})();

async function fetchOpenMeteoWeather(place){
  const params = new URLSearchParams({
    latitude:String(place.latitude),
    longitude:String(place.longitude),
    timezone:"Asia/Taipei",
    current:"temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,precipitation_probability",
    daily:"weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max",
    forecast_days:"7"
  });
  const res = await fetch(`${weatherApiBase}?${params.toString()}`, { cache:"no-store" });
  if(!res.ok) throw new Error(`weather api ${res.status}`);
  return await res.json();
}
function applyWeatherPayload(data, place, usingCurrentLocation=false){
  const current = data.current || {};
  const daily = data.daily || {};
  const [icon, desc] = weatherCodeInfo(current.weather_code ?? (daily.weather_code||[])[0]);
  const times = daily.time || [];
  const week = times.slice(0,7).map((dateText,index) => {
    const [dayIcon, dayText] = weatherCodeInfo((daily.weather_code||[])[index]);
    return {
      weekday: weatherWeekdayLabel(dateText,index),
      displayDate: weatherDisplayDate(dateText),
      icon: dayIcon,
      text: dayText,
      high: Math.round((daily.temperature_2m_max||[])[index] ?? 0),
      low: Math.round((daily.temperature_2m_min||[])[index] ?? 0),
      rain: Math.round((daily.precipitation_probability_max||[])[index] ?? 0)
    };
  });
  const now = new Date();
  weatherState = {
    ...weatherState,
    loading:false,
    city: place.city || (usingCurrentLocation ? "目前位置" : "台中市"),
    currentTemp: Math.round(current.temperature_2m ?? weatherState.currentTemp),
    currentDesc: desc,
    humidity: `${Math.round(current.relative_humidity_2m ?? 0)}%`,
    rainToday: `${Math.round(current.precipitation_probability ?? ((daily.precipitation_probability_max||[])[0] ?? 0))}%`,
    comfort: `體感 ${Math.round(current.apparent_temperature ?? current.temperature_2m ?? 0)}°C`,
    icon,
    week: week.length ? week : weatherState.week,
    updatedAt: `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,"0")}/${String(now.getDate()).padStart(2,"0")} ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`,
    usingCurrentLocation,
    error:"",
    note:"即時天氣資料來源：Open-Meteo，自動連線更新。"
  };
}
function getBrowserLocation(){
  return new Promise((resolve,reject) => {
    if(!navigator.geolocation) return reject(new Error("此瀏覽器不支援定位"));
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ city:"目前位置", latitude:pos.coords.latitude, longitude:pos.coords.longitude }),
      err => reject(err),
      { enableHighAccuracy:false, timeout:8000, maximumAge:600000 }
    );
  });
}
async function refreshWeather(forceLocation=false){

  if(!state.currentUser || !state.profile) render();
  try{
    const place = forceLocation ? await getBrowserLocation() : weatherDefaultPlace;
    const data = await fetchOpenMeteoWeather(place);
    if(weatherLastRequest !== requestId) return;
    applyWeatherPayload(data, place, forceLocation);
  }catch(err){
    if(weatherLastRequest !== requestId) return;
    weatherState = {
      ...weatherState,
      loading:false,
      city: forceLocation ? "目前位置" : "台中市",
      error:"天氣連線暫時失敗，已保留最後一次資料。",

async function makeInlineImageUrl(file){
  if(!String(file?.type || "").startsWith("image/")){
    throw new Error("影片需要 Firebase Storage 權限；目前只能在 Storage 正常時上傳影片。請先改用圖片，或請管理員開啟 Storage 寫入權限後再上傳影片。");
  }
  const original = await readFileAsDataUrl(file);
  const img = await loadImageElement(original);
  const canvas = document.createElement("canvas");
  const maxSide = 900;
  const scale = Math.min(1, maxSide / Math.max(img.naturalWidth || img.width || 1, img.naturalHeight || img.height || 1));
  canvas.width = Math.max(1, Math.round((img.naturalWidth || img.width || 1) * scale));
  canvas.height = Math.max(1, Math.round((img.naturalHeight || img.height || 1) * scale));
  const ctx = canvas.getContext("2d", {alpha:false});
  ctx.fillStyle = "#fff";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  let quality = 0.78;
  let dataUrl = canvas.toDataURL("image/jpeg", quality);
  while(dataUrl.length > 155000 && quality > 0.32){
    quality -= 0.06;
    dataUrl = canvas.toDataURL("image/jpeg", quality);
  }
  if(dataUrl.length > 180000){
    const tiny = document.createElement("canvas");
    const tinyScale = Math.min(1, 640 / Math.max(canvas.width, canvas.height));
    tiny.width = Math.max(1, Math.round(canvas.width * tinyScale));
    tiny.height = Math.max(1, Math.round(canvas.height * tinyScale));
    const tinyCtx = tiny.getContext("2d", {alpha:false});
    tinyCtx.fillStyle = "#fff";
    tinyCtx.fillRect(0,0,tiny.width,tiny.height);
    tinyCtx.drawImage(canvas,0,0,tiny.width,tiny.height);
    dataUrl = tiny.toDataURL("image/jpeg", 0.42);
  }
  if(dataUrl.length > 220000) throw new Error("圖片壓縮後仍過大，請改用較小圖片後再補傳。");
  return dataUrl;
}

function uploadHandoverStorageFile(photoRef, file, timeoutMs, statusPrefix){
  const metadata = {contentType:handoverMediaContentType(file), customMetadata:{uid:String(currentUid() || ""), store:String(effectiveStore() || "")}};
  if(typeof uploadBytesResumable !== "function"){
    return withHandoverTimeout(uploadBytes(photoRef, file, metadata), timeoutMs, statusPrefix || "媒體上傳");
  }
  return new Promise((resolve,reject)=>{
    let settled = false;
    let lastProgress = -1;
    const finish = (fn, value) => {
      if(settled) return;
      settled = true;
      clearTimeout(timer);
      fn(value);
    };
    const timer = setTimeout(()=>{
      finish(reject, new Error(`${statusPrefix || "媒體上傳"}逾時，請確認網路後重試`));
    }, timeoutMs);
    try{
      const task = uploadBytesResumable(photoRef, file, metadata);
      task.on("state_changed", snapshot => {
        try{
          const total = Number(snapshot.totalBytes || file.size || 0) || 1;
          const done = Number(snapshot.bytesTransferred || 0);
          const percent = Math.max(0, Math.min(99, Math.round(done / total * 100)));

            lastProgress = percent;
            setHandoverMediaProcessStatus(`${statusPrefix || "媒體上傳"} ${percent}%…`);
          }

      }, error => finish(reject, error), () => finish(resolve, task.snapshot));
    }catch(error){
      finish(reject, error);
    }
  });
}
async function uploadHandverPhoto(file){

async function uploadHandverPhotos(files){
  const list = Array.from(files || []).filter(Boolean);
  if(handoverMediaBusy) throw new Error("媒體仍在處理中，請稍候完成後再按一次");
  handoverMediaBusy = true;
  const uploaded = [];
  const failed = [];
  try{
    for(let i=0;i<list.length;i++){
      const file = list[i];
      const type = String(file?.type || "");
      if(type.startsWith("image/")){
        try{
          setHandoverMediaProcessStatus(`正在處理圖片 ${i+1}/${list.length}…`);
          const url = await withHandoverTimeout(makeInlineImageUrl(file), 25000, "圖片處理");
          uploaded.push({ url, name:file.name || "照片", type:"image/jpeg", storageMode:"inline" });
          continue;
        }catch(inlineError){
          failed.push({file, error:inlineError});
          continue;
        }
      }
      try{
        let readyFile = file;
        if(isHandoverVideoFile(file)){
          setHandoverMediaProcessStatus(`準備上傳影片 ${i+1}/${list.length}…`);
          readyFile = await maybeCompressHandoverVideo(file);
        }
        setHandoverMediaProcessStatus(`正在上傳媒體 ${i+1}/${list.length}…`);
        const url = await uploadHandverPhoto(readyFile);
        uploaded.push({ url, name:readyFile.name || file.name || "影片", type:normalizeHandoverMediaType(readyFile), storageMode:"storage", compressed:readyFile !== file });
      }catch(error){
        failed.push({file, error});
      }
    }
    if(failed.length){
      const first = failed[0];
      const names = failed.map(item => item.file?.name || "未命名媒體").join("、");
      const err = first.error || new Error("媒體上傳失敗");
      err.failedMediaNames = names;
      err.uploadedMedia = uploaded;
      throw err;
    }
    return uploaded;
  }finally{
    handoverMediaBusy = false;
    setHandoverMediaProcessStatus("");
  }
}

    const pendingItems = list.filter(i => i.status==="pending");

function groupedSearchItemsByStore(items){
  const order = visibleStores().map(s => s.id);
  const map = new Map();
  (items || []).forEach(item => {
    const key = item.storeId || "其他";
    if(!map.has(key)){
      const store = state.stores.find(s => s.id === key);
      map.set(key, { id:key, name:item.storeName || store?.name || (key === "其他" ? "其他" : `${key}店`), items:[] });
    }
    map.get(key).items.push(item);
  });
  return Array.from(map.values()).sort((a,b) => {
    const ai = order.indexOf(a.id), bi = order.indexOf(b.id);
    if(ai !== -1 || bi !== -1) return (ai === -1 ? 9999 : ai) - (bi === -1 ? 9999 : bi);
    return String(a.name).localeCompare(String(b.name), "zh-Hant");
  });

const RELOAD_LOGIN_SESSION_KEY = "weather_reload_login_session_B613";
const RELOAD_LOGIN_FLAG_KEY = "weather_reload_in_progress_B613";
const RELOAD_LOGIN_MAX_AGE_MS = 12 * 60 * 60 * 1000;
function safeUserForReload(user){

}
function saveReloadLoginSession(user, profile){
  try{
    if(!user || !profile) return;
    localStorage.setItem(RELOAD_LOGIN_SESSION_KEY, JSON.stringify({
      user:safeUserForReload(user),
      profile:{...profile},
      tab:state.tab || "dashboard",
      selectedStore:state.selectedStore || "A",
      selectedDate:dashboardActiveDate(),
      savedAt:Date.now()
    }));
  }catch(e){}
}
function readReloadLoginSession(){
  try{
    const idleDeadline = Number(localStorage.getItem("weather_force_logout_deadline_B696") || 0);
    if(idleDeadline && Date.now() >= idleDeadline){
      try{
        localStorage.removeItem(RELOAD_LOGIN_SESSION_KEY);
        localStorage.removeItem(RELOAD_LOGIN_FLAG_KEY);
      }catch(e){}
      return null;
    }
    const raw = localStorage.getItem(RELOAD_LOGIN_SESSION_KEY);
    if(!raw) return null;
    const data = JSON.parse(raw);
    if(!data || !data.user || !data.profile || !data.savedAt) return null;
    if(Date.now() - Number(data.savedAt) > RELOAD_LOGIN_MAX_AGE_MS) return null;
    return data;
  }catch(e){ return null; }
}
function clearReloadLoginSession(){
  try{
    localStorage.removeItem(RELOAD_LOGIN_SESSION_KEY);
    localStorage.removeItem(RELOAD_LOGIN_FLAG_KEY);
  }catch(e){}
}

function shouldSoftRestoreAfterReload(){
  try{
    // 9.2.3：同時讀 localStorage / sessionStorage / URL loginRefresh；手機首次重整時 Firebase 可能先回 null，這裡保留後台畫面等 Auth 補上。
    const localTs = Number(localStorage.getItem(RELOAD_LOGIN_FLAG_KEY) || 0);
    const sessionTs = Number(sessionStorage.getItem(RELOAD_LOGIN_FLAG_KEY) || 0);
    const ts = Math.max(localTs || 0, sessionTs || 0);
    if(ts && Date.now() - ts < 5 * 60 * 1000) return true;
    const saved = readReloadLoginSession();
    if(saved && saved.savedAt && hasLoginRefreshParam() && Date.now() - Number(saved.savedAt) < 5 * 60 * 1000) return true;
    return false;
  }catch(e){ return false; }
}

/* 9.2.3：如果手機下拉重新整理導致 Firebase 暫時回傳 null，先用本機最近登入狀態保留後台畫面，避免跳回首頁。 */
async function waitForLoginAuthTokenReady(user, reason="login"){
  // 9.2.3：第一次登入後，Firestore 讀取必須等 Firebase Auth token 完整就緒；避免事項資料監聽太早啟動，造成需手動第二次重新整理才顯示。
  if(!user) return false;
  const started = Date.now();
  for(let attempt=0; attempt<3; attempt++){
    try{
      if(typeof user.getIdToken === "function") await user.getIdToken(attempt === 0);
      if(auth && auth.currentUser && String(auth.currentUser.uid || "") === String(user.uid || "")){
        state.__loginAuthTokenReadyAt = new Date().toISOString();
        state.__loginAuthTokenReadyReason = reason;
        return true;
      }
    }catch(e){
      console.warn("9.2.3 login auth token wait retry", reason, attempt + 1, e);
    }
    await new Promise(resolve => setTimeout(resolve, 260 + attempt * 420));
  }
  try{
    if(auth && auth.currentUser && typeof auth.currentUser.getIdToken === "function"){
      await auth.currentUser.getIdToken(false);
      state.__loginAuthTokenReadyAt = new Date().toISOString();
      state.__loginAuthTokenReadyReason = reason + "-currentUser";
      return true;
    }
  }catch(e){ console.warn("9.2.3 login auth currentUser token wait failed", e); }
  state.__loginAuthTokenWaitFailedAt = new Date().toISOString();
  state.__loginAuthTokenWaitMs = Date.now() - started;
  return false;
}

  saveReloadLoginSession(user, createdProfile);
  // 9.2.3：新帳號也先補抓必要資料，再顯示後台。
  await stableInitialDataLoadAfterLogin('new-user-login');

function handoverMonthRange(dateValue){
  const base = /^\d{4}-\d{2}-\d{2}$/.test(String(dateValue || "")) ? String(dateValue).slice(0,10) : today();
  const [y,m] = base.split("-").map(Number);
  // 9.2.3：交接頁只讀「本月＋上個月」，避免手機登入抓全量資料。
  const prev = new Date(y, m - 2, 1);
  const start = String(prev.getFullYear()) + "-" + String(prev.getMonth()+1).padStart(2,"0") + "-01";
  const endDate = new Date(y, m, 0).getDate();
  const end = String(y) + "-" + String(m).padStart(2,"0") + "-" + String(endDate).padStart(2,"0");
  return {start,end};
}
function mergeHandoverRows(existing, incoming){
  const map = new Map((existing || []).map(row => [String(row.id), row]));
  (incoming || []).forEach(row => map.set(String(row.id), {...(map.get(String(row.id)) || {}), ...row}));
  return Array.from(map.values());
}
function currentMonthHandoversQuery(){
  const activeDate = state.tab === "dashboard" ? (state.dashboardDate || state.selectedDate || today()) : (state.newItemDate || state.historyDate || today());
  const range = handoverMonthRange(activeDate);
  return query(collection(db,"handovers"), where("date", ">=", range.start), where("date", "<=", range.end));
}
async function stableInitialDataLoadAfterLogin(reason="login"){
  // 9.2.3：穩定修法。登入後先等 Auth token 完整就緒，再補抓總覽/交接/權限必要資料，避免手機版第一次登入後事項不顯示。
  const role = normalizeRole(state.profile?.role);
  const isManagerLike = ["admin","general_manager","store_supervisor"].includes(role);
  if(!state.currentUser || !state.profile || !isManagerLike) return;
  await waitForLoginAuthTokenReady(state.currentUser, reason + "-before-data-read");
  const preloadStartedAt = new Date().toISOString();
  try{ setState({infoMessage:"正在載入資料…", mobileInitialPreloadStartedAt:preloadStartedAt}); }catch(e){}
  const withTimeout = (promise, ms, label) => Promise.race([
    promise,
    new Promise(resolve => setTimeout(() => resolve({__timeout:true,label}), ms))
  ]);
  try{
    const handoverPromise = getDocs(currentMonthHandoversQuery()).then(snap => snap.docs.map(d=>({id:d.id,...d.data(),storeId:normalizeStoreId(d.data().storeId)})));
    const storesPromise = getDocs(collection(db,"stores")).then(snap => snap.docs.map(d=>({id:d.id,...d.data(),name:normalizeStoreName(d.id, d.data().name)})).sort((a,b)=>String(a.id).localeCompare(String(b.id))));
    const usersPromise = getDocs(collection(db,"users")).then(snap => snap.docs.map(d=>({id:d.id,...d.data(),role:normalizeRole(d.data().role)})));
    const appsPromise = ["admin","general_manager"].includes(role)
      ? getDocs(collection(db,"applications")).then(snap => snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>String(b.createdAt?.seconds||0).localeCompare(String(a.createdAt?.seconds||0))))
      : Promise.resolve(null);
    const [handovers, stores, users, applications] = await Promise.all([
      withTimeout(handoverPromise, 4500, "handovers"),
      withTimeout(storesPromise, 3500, "stores"),
      withTimeout(usersPromise, 3500, "users"),
      withTimeout(appsPromise, 3500, "applications")
    ]);
    const patch = {
      mobileInitialPreloadDoneAt:new Date().toISOString(),
      mobilePriorityLoadedAt:new Date().toISOString(),
      handoverCalendarSyncedAt:new Date().toISOString(),
      mobileBackgroundSyncedAt:new Date().toISOString(),
      infoMessage:""
    };

      if(state.__usersReadSig !== sig) setState({users:rows, __usersReadSig:sig});
    }));
    unsubscribers.push(onSnapshot(collection(db,"applications"), snap => {
      const rows = snap.docs.map(d=>({id:d.id,...d.data()}));

function subscribeData(){
  clearSubs();
  state.__handoverSubscribeStartedMs = Date.now();
  state.__handoverSubscribeStartedAt = new Date().toISOString();
  // 9.2.3：最強優化版。先掛即時監聽，背景補讀只當保險；相同資料不重複渲染，降低手機卡頓。
  subscribeSharedCollections();
  let handoverSnapshotArrived = false;
  let handoverApplyTimer = null;
  // 9.2.3：管理員/店長先讀今日資料，讓總覽數字與今日狀態先出來，本月完整資料再背景補齊。
  const quickTodayReadForManager = async () => {
    if(isMobileRuntime() || !["admin","general_manager"].includes(normalizeRole(state.profile?.role))) return;
    try{
      const todaySnap = await getDocs(query(collection(db,"handovers"), where("date", "==", state.dashboardDate || today())));
      const todayRows = todaySnap.docs.map(d=>({id:d.id,...d.data()}));
      if(todayRows.length) setState({handovers:mergeHandoverRows(state.handovers || [], todayRows), mobilePriorityLoadedAt:new Date().toISOString()});
    }catch(e){ console.warn("9.2.3 manager quick today read skipped", e); }
  };
  quickTodayReadForManager();
  const handoverRowsSignature = rows => {
    try{
      return (rows || []).map(r => [
        r.id, r.date, normalizeStoreId(r.storeId), r.shift, r.status, r.category,
        r.updatedAt?.seconds || r.updatedAt || "",
        r.createdAt?.seconds || r.createdAt || "",
        String(r.content || "").length,
        Array.isArray(r.readBy) ? r.readBy.length : 0,
        Array.isArray(r.photos) ? r.photos.length : 0
      ].join("~")).sort().join("|");
    }catch(e){ return String(Date.now()); }
  };
  const applyHandoverRows = (rows, sourceLabel) => {
    const normalizedRows = Array.isArray(rows) ? rows.map(r => ({...r, storeId:normalizeStoreId(r.storeId)})) : [];
    const existingRows = Array.isArray(state.handovers) ? state.handovers : [];
    const justSubscribed = Date.now() - Number(state.__handoverSubscribeStartedMs || 0) < 9000;
    // 9.2.3：登入後第一輪 snapshot / fallback 偶爾會先回空；若本機剛預載已有資料，禁止空資料把事項清掉。
    if(justSubscribed && normalizedRows.length === 0 && existingRows.length > 0){
      state.__handoverSkippedEmptyFirstReadAt = new Date().toISOString();
      state.__handoverSkippedEmptyFirstReadSource = sourceLabel;
      return;
    }
    const shouldMerge = String(sourceLabel || "").indexOf("fallback") === 0 || String(sourceLabel || "").indexOf("login-visible") === 0;
    const nextRows = shouldMerge ? mergeHandoverRows(existingRows, normalizedRows) : normalizedRows;
    const signature = handoverRowsSignature(nextRows);
    if(sourceLabel === "snapshot" && signature && signature === state.__handoverRowsSignature) return;
    state.__handoverRowsSignature = signature;
    clearTimeout(handoverApplyTimer);
    handoverApplyTimer = setTimeout(() => {
      setState({
        handovers: nextRows,
        handoverCalendarSyncedAt: new Date().toISOString(),
        mobileBackgroundSyncedAt: new Date().toISOString(),
        mobilePrioritySyncedAt: new Date().toISOString(),
        mobilePriorityLoadedAt: new Date().toISOString(),
        infoMessage: state.infoMessage || (String(sourceLabel || "").indexOf("fallback") === 0 ? "已補齊交接資料。" : "")
      });
      if(String(sourceLabel || "").indexOf("fallback") === 0){
        setTimeout(()=>{ try{ if(state.infoMessage === "已補齊交接資料。") setState({infoMessage:""}); }catch(e){} }, 1200);
      }
    }, sourceLabel === "snapshot" ? 60 : 0);
  };
  unsubscribers.push(onSnapshot(currentMonthHandoversQuery(), snap => {
    handoverSnapshotArrived = true;
    const rows = snap.docs.map(d=>({id:d.id,...d.data()}));
    applyHandoverRows(rows, "snapshot");
  }, err => {
    console.error("9.2.3 handovers 即時監聽失敗", err);
    try{ setState({infoMessage:"交接即時讀取暫時失敗，正在改用補讀。"}); }catch(e){}
  }));
  // 背景補讀只做保險，不阻塞手機版進入總覽與交接頁；兩段式補讀可降低手機網路慢時的空白感。
  const fallbackRead = async (label) => {
    try{
      if(handoverSnapshotArrived && Array.isArray(state.handovers) && state.handovers.length) return;
      await waitForLoginAuthTokenReady(state.currentUser, "handover-fallback-" + label);
      const handoverSnap = await getDocs(currentMonthHandoversQuery());
      const rows = handoverSnap.docs.map(d=>({id:d.id,...d.data()}));
      applyHandoverRows(rows, label);
    }catch(e){
      console.error("9.2.3 handovers 背景補讀失敗", e);
      try{ setState({infoMessage:"交接資料補讀失敗，請稍後重試或重新整理。"}); }catch(err){}
    }
  };
  setTimeout(()=>fallbackRead("fallback"), 900);
  setTimeout(()=>fallbackRead("fallback-late"), 3200);
  // 其他完整資料仍在背景補齊，但不覆蓋 handovers 的即時來源，避免手機等待。
  primeDashboardDataOnce().catch(e => console.error("9.2.3 background prime failed", e));
  return Promise.resolve();
}

async function reviewApplication(uid, status){
  if(!canManageUsers()) return alert("只有管理員或店長可審核申請");
  const appRef = doc(db,"applications",uid);
  const userRef = doc(db,"users",uid);
  const appSnap = await getDoc(appRef);
  const userSnap = await getDoc(userRef);
  if(!appSnap.exists() || !userSnap.exists()) {
    setState({ applications:(state.applications || []).filter(app => app.id !== uid && app.uid !== uid) });
    return;
  }
  const appData = appSnap.data();
  const userData = userSnap.data();
  const payload = {
    status,
    reviewedByUid: currentUid() || null,
    reviewedByName: currentUserName(),
    updatedAt: serverTimestamp()
  };
  await setDoc(appRef, payload, {merge:true});
  const userUpdate = { applicationStatus:status, updatedAt:serverTimestamp() };
  if(status === "approved"){
    userUpdate.active = true;
    userUpdate.pendingApproval = false;
  }else if(status === "rejected"){
    userUpdate.active = false;
    userUpdate.pendingApproval = false;
  }else{
    userUpdate.active = false;
    userUpdate.pendingApproval = true;
  }
  await setDoc(userRef, userUpdate, {merge:true});
  alert(status === "approved" ? `已通過 ${appData.name || userData.name || userData.email} 的申請` : status === "rejected" ? `已標記 ${appData.name || userData.name || userData.email} 為不通過` : `已改為`);
}

function scheduleIdleTimerByDeadline(deadline){
  if(storeSupervisorIdleTimer) clearTimeout(storeSupervisorIdleTimer);
  const remaining = Math.max(0, Number(deadline || 0) - idleNow());
  storeSupervisorIdleTimer = setTimeout(() => {
    forceStoreSupervisorIdleLogout(`帳號已超過 ${idleLogoutMinuteText()} 未操作，系統已自動登出。`);
  }, remaining);

function resetStoreSupervisorIdleLogout(){
  if(!isStoreSupervisorIdleLogoutTarget()){
    stopStoreSupervisorIdleLogout();
    clearIdleDeadline();
    return;
  }
  storeSupervisorLastActivityAt = idleNow();
  const deadline = storeSupervisorLastActivityAt + idleLogoutLimitMs();
  writeIdleDeadline(deadline);
  scheduleIdleTimerByDeadline(deadline);
  if(!storeSupervisorIdleTicker){
    storeSupervisorIdleTicker = setInterval(() => {
      if(!isStoreSupervisorIdleLogoutTarget()){
        stopStoreSupervisorIdleLogout();
        clearIdleDeadline();
        return;
      }
      const deadlineNow = readIdleDeadline();
      if(deadlineNow && idleNow() >= deadlineNow){
        forceStoreSupervisorIdleLogout(`帳號已超過 ${idleLogoutMinuteText()} 未操作，系統已自動登出。`);
      }
    }, 15000);
  }

function checkStoreSupervisorIdleDeadline(){

  const deadline = readIdleDeadline();
  if(deadline && idleNow() >= deadline){
    forceStoreSupervisorIdleLogout(`帳號已超過 ${idleLogoutMinuteText()} 未操作，系統已自動登出。`);
  }else if(deadline){
    scheduleIdleTimerByDeadline(deadline);
  }else{
    resetStoreSupervisorIdleLogout();
  }
}

  if(document.hidden) return;
  const now = idleNow();
  if(now - storeSupervisorLastActivityAt < 1000) return;
  resetStoreSupervisorIdleLogout();
}

  state.editingItemSaving = true;

  let uploadError = null;
  try{
    if(pendingFiles.length){
      try{
        const uploadedMedia = await withHandoverTimeout(uploadHandverPhotos(pendingFiles), Math.max(60000, pendingFiles.length * 60000), "編輯圖片處理");
        uploaded = uploadedMedia.map((item,index)=>({
          url:item.url,
          name:item.name || pendingFiles[index]?.name || "圖片檔案",
          type:item.type || normalizeHandoverMediaType(pendingFiles[index])
        }));
      }catch(err){
        uploadError = err;
        if(Array.isArray(err?.uploadedMedia) && err.uploadedMedia.length){
          uploaded = err.uploadedMedia.map((item,index)=>({
            url:item.url,
            name:item.name || pendingFiles[index]?.name || "圖片檔案",
            type:item.type || normalizeHandoverMediaType(pendingFiles[index])
          }));
        }
        console.error("edit image upload partially failed:", err);
      }
    }
    const allMedia = existing.concat(uploaded).slice(0,5);
    const photoUrls = allMedia.map(item => item.url || "").filter(Boolean);
    const photoNames = allMedia.map(item => item.name || "圖片檔案");
    const mediaTypes = allMedia.map(item => item.type || "");

    }), 30000, "交接內容儲存");

    setState({editingItemId:null,editingItemTitle:"",editingItemContent:"",editingItemSaving:false});

      const detail = handoverUploadErrorText(uploadError);
      const failedNames = uploadError?.failedMediaNames ? `\n未完成：${uploadError.failedMediaNames}` : "";

    }
  }catch(e){
    console.error(e);
    state.editingItemSaving = false;
    state.editingItemMediaProcessText = "";
    render();
    const detail = typeof formatStorageError === "function" ? formatStorageError(e) : (e?.message || String(e));
    alert(`編輯儲存失敗：${detail}
頁面操作已恢復，可重新按儲存或取消。`);

    if(state.editingItemSaving){
      state.editingItemSaving = false;
      state.editingItemMediaProcessText = "";
      render();
    }
    try{ if(typeof window.__handoverModalSafeUnlock === "function" && !state.editingItemId) window.__handoverModalSafeUnlock(); }catch(e){}
  }

function bytesToBase64Url(bytes){
  const arr = bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes);
  let s = "";
  arr.forEach(b => s += String.fromCharCode(b));
  return btoa(s).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}
function base64UrlToBytes(str){
  str = String(str || "").replace(/-/g,"+").replace(/_/g,"/");
  while(str.length % 4) str += "=";
  const bin = atob(str);
  const out = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) out[i] = bin.charCodeAt(i);
  return out;
}
function randomChallenge(len=32){
  const b = new Uint8Array(len);
  if(window.crypto && crypto.getRandomValues) crypto.getRandomValues(b);
  else for(let i=0;i<len;i++) b[i] = Math.floor(Math.random()*256);
  return b;
}
async function createBiometricCredential(email){
  if(!canUsePlatformBiometric()){
    throw new Error("此裝置或瀏覽器不支援 Face ID / 指紋快速登入，請使用一般登入。");
  }
  const ok = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().catch(()=>false);
  if(!ok) throw new Error("目前裝置未啟用可用的臉部 / 指紋 / 螢幕鎖驗證。");
  const cleanEmail = String(email || "").trim().toLowerCase();
  if(!cleanEmail) throw new Error("找不到帳號 Email，請先完成一般登入。");
  const userBytes = new TextEncoder().encode(cleanEmail).slice(0,64);
  const credential = await navigator.credentials.create({
    publicKey:{
      challenge: randomChallenge(32),
      rp:{name:"天氣系統"},
      user:{id:userBytes, name:cleanEmail, displayName:cleanEmail},
      pubKeyCredParams:[
        {type:"public-key", alg:-7},
        {type:"public-key", alg:-257}
      ],
      authenticatorSelection:{
        authenticatorAttachment:"platform",
        userVerification:"required",
        residentKey:"preferred",
        requireResidentKey:false
      },
      timeout:60000,
      attestation:"none"
    }
  });

    id: credential.id,
    rawId: bytesToBase64Url(credential.rawId),
    type: credential.type,

async function runDeviceVerification(email){

  if(!canUsePlatformBiometric()){
    throw new Error("此瀏覽器不支援裝置驗證，請使用 Email + 密碼登入。");
  }
  const ok = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().catch(()=>false);
  if(!ok) throw new Error("目前裝置無法執行 Face ID / 指紋驗證。");
  const assertion = await navigator.credentials.get({
    publicKey:{
      challenge: randomChallenge(32),
      allowCredentials:[{type:"public-key", id:base64UrlToBytes(record.rawId)}],
      userVerification:"required",
      timeout:60000
    }
  });

function addMonths(value, diff){

function handoverDateStatusClass(dateValue, storeId){

function datePickerHtml(target, value, align="right"){

  const d = Number.isNaN(base.getTime()) ? new Date() : base;
  const year = d.getFullYear();
  const month = d.getMonth();
  const first = new Date(year, month, 1);
  const start = new Date(first);
  start.setDate(1 - first.getDay());
  const days = [];
  for(let i=0;i<42;i++){
    const cur = new Date(start);
    cur.setDate(start.getDate()+i);
    const val = calendarDateValue(cur.getFullYear(), cur.getMonth(), cur.getDate());
    const isOther = cur.getMonth() !== month;
    const isSelected = val === value;
    const dateStatusClass = handoverDateStatusClass(val, target === "historyDate" ? state.historyStore : effectiveStore());
    days.push(`<button type="button" class="cal-day ${isOther?"other":""} ${dateStatusClass} ${isSelected?"selected":""}" onpointerdown="event.preventDefault(); selectDateFromCalendar('${target}','${val}')">${cur.getDate()}</button>`);
  }
  return `<div class="date-calendar ${align==='left'?'left':''}"><div class="cal-head"><button type="button" class="cal-nav" onpointerdown="event.preventDefault(); moveCalendarMonth('${target}',-1)">‹</button><div>${monthLabelFromDate(value)}</div><button type="button" class="cal-nav" onpointerdown="event.preventDefault(); moveCalendarMonth('${target}',1)">›</button></div><div class="cal-week"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div><div class="cal-days">${days.join("")}</div><div class="cal-legend"><span><span class="cal-dot-yellow"></span>全部已處理　<span class="cal-dot-red"></span>有未完成事項</span><button type="button" class="btn secondary" style="padding:6px 10px;border-radius:10px" onpointerdown="event.preventDefault(); selectDateFromCalendar('${target}','${today()}')">今天</button></div></div>`;
}

function monthWheelOptions(center, min, max, padLength=0, range=4){
  const items = [];
  const c = Math.max(min, Math.min(max, Number(center) || min));
  for(let value=c-range; value<=c+range; value++){
    if(value < min || value > max) continue;
    items.push(`<button type="button" class="month-wheel-option ${value===c?'active':''}" data-wheel-value="${value}" onclick="setMonthWheelValue('${arguments[4]||''}', '${arguments[5]||''}', ${value})">${String(value).padStart(padLength,'0')}</button>`);
  }
  return items.join("");
}
function monthYearSelectHtml(target, value, label="年月"){
  const ym = ymFromDate(value || today());
  const [yearText, monthText] = ym.split("-");
  const selectedYear = Number(yearText) || Number(today().slice(0,4)) || new Date().getFullYear();
  const selectedMonth = Number(monthText) || 1;
  const yearOptions = [];
  for(let y=selectedYear-5; y<=selectedYear+5; y++){
    if(y < 1900 || y > 2999) continue;
    const roc = y - 1911;
    const display = roc > 0 ? `民國 ${roc} 年` : `${y} 年`;
    yearOptions.push(`<option value="${y}" ${y===selectedYear?'selected':''}>${display}</option>`);
  }
  const monthOptions = [];
  for(let m=1; m<=12; m++){
    monthOptions.push(`<option value="${String(m).padStart(2,'0')}" ${m===selectedMonth?'selected':''}>${m}月</option>`);
  }

}
function dateFromYearMonthKeepingDay(target, year, month){
  const current = target === "historyDate" ? (state.historyDate || today()) : (target === "dateInput" ? (state.dashboardDate || state.selectedDate || today()) : (state.newItemDate || today()));
  const keepDay = Number(String(current).slice(8,10)) || 1;
  const maxDay = new Date(Number(year), Number(month), 0).getDate();
  return `${year}-${String(month).padStart(2,"0")}-${String(Math.min(keepDay, maxDay)).padStart(2,"0")}`;
}
function ymFromDate(value){
  const v = String(value || today());
  return /^\d{4}-\d{2}/.test(v) ? v.slice(0,7) : today().slice(0,7);
}
function daysInMonthFromYM(ym){
  const [y,m] = String(ym || ymFromDate(today())).split("-").map(Number);
  return new Date(y, m, 0).getDate();
}
function buildDateFromYMDay(ym, day){
  return `${ym}-${String(day).padStart(2,"0")}`;
}
function normalizeMonthText(value){
  const raw = String(value || "").trim();
  const digits = raw.replace(/\D/g, "");
  let y = "", m = "";
  if(/^\d{4}[-\/]\d{1,2}$/.test(raw)){
    const parts = raw.split(/[-\/]/); y = parts[0]; m = parts[1];
  }else if(digits.length >= 6){
    y = digits.slice(0,4); m = digits.slice(4,6);
  }
  if(!y || !m) return "";
  const year = Number(y), month = Number(m);
  if(year < 1900 || year > 2999 || month < 1 || month > 12) return "";
  return `${String(year).padStart(4,"0")}-${String(month).padStart(2,"0")}`;
}
function normalizeDateText(value){
  const raw = String(value || "").trim();
  const digits = raw.replace(/\D/g, "");
  let y = "", m = "", d = "";
  if(/^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}$/.test(raw)){
    const parts = raw.split(/[-\/]/); y = parts[0]; m = parts[1]; d = parts[2];
  }else if(digits.length >= 8){
    y = digits.slice(0,4); m = digits.slice(4,6); d = digits.slice(6,8);
  }
  if(!y || !m || !d) return "";
  const year = Number(y), month = Number(m), day = Number(d);
  if(year < 1900 || year > 2999 || month < 1 || month > 12) return "";
  const max = new Date(year, month, 0).getDate();
  if(day < 1 || day > max) return "";
  return `${String(year).padStart(4,"0")}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
}
function formatDateTyping(value){
  const digits = String(value || "").replace(/\D/g, "").slice(0,8);
  if(digits.length <= 4) return digits;
  if(digits.length <= 6) return `${digits.slice(0,4)}/${digits.slice(4)}`;
  return `${digits.slice(0,4)}/${digits.slice(4,6)}/${digits.slice(6)}`;
}
function formatMonthTyping(value){
  // 支援 KEY 202604，也支援原版顯示 2026年04月；輸入中只格式化，不重繪月曆。
  const digits = String(value || "").replace(/\D/g, "").slice(0,6);
  if(digits.length <= 4) return digits;
  return `${digits.slice(0,4)}年${digits.slice(4)}月`;
}

function changeNewItemMonth(diff){
  const current = state.tab === "dashboard" ? (state.selectedDate || today()) : (state.newItemDate || today());
  const base = new Date(current + "T00:00:00");
  const safe = Number.isNaN(base.getTime()) ? new Date() : base;
  const originalDay = Number(String(current).slice(8,10)) || 1;
  safe.setMonth(safe.getMonth() + diff, 1);
  const maxDay = new Date(safe.getFullYear(), safe.getMonth()+1, 0).getDate();
  const next = calendarDateValue(safe.getFullYear(), safe.getMonth(), Math.min(maxDay, originalDay));
  if(state.tab === "dashboard") setState({ selectedDate: next, dashboardDate: next });
  else setState({ newItemDate: next, historyDate: next });
}

function applicationStatusMeta(status){
  if(status === "approved") return {label:"通過", cls:"ok"};
  if(status === "rejected") return {label:"不通過", cls:"warn"};
  return {label:"待審核", cls:"neutral"};
}
function applicationList(){
  const appMap = new Map();
  (state.applications || []).forEach(app => {
    if(app?.id) appMap.set(String(app.id), {id:String(app.id), ...app});
  });
  (state.users || []).forEach(user => {
    const isPending = user?.pendingApproval || user?.applicationStatus === "pending";
    if(!user?.id || user?.removed || !isPending) return;
    if(appMap.has(String(user.id))) return;
    appMap.set(String(user.id), {
      id: String(user.id),
      uid: String(user.id),
      email: user.email || user.username || "",
      name: user.name || "",
      status: user.applicationStatus || "pending",
      createdAt: user.createdAt || user.updatedAt || null,
      updatedAt: user.updatedAt || user.createdAt || null,
      reviewedByName: user.reviewedByName || "",
      fallbackFromUsers: true
    });
  });
  return Array.from(appMap.values()).sort((a,b) => {
    const aSec = Number(a?.updatedAt?.seconds || a?.createdAt?.seconds || 0);
    const bSec = Number(b?.updatedAt?.seconds || b?.createdAt?.seconds || 0);
    return bSec - aSec;
  });
}

window.applyMonthYearFromUI = function(target, force){
  const yearEl = document.getElementById(`${target}Year`);
  const monthEl = document.getElementById(`${target}Month`);
  if(!yearEl || !monthEl) return;
  const rawYear = String(yearEl.value || "").replace(/\D/g, "");
  const rawMonth = String(monthEl.value || "").replace(/\D/g, "");
  if(!force && (rawYear.length < 4 || rawMonth.length < 1)) return;
  let year = Number(rawYear);
  let month = Number(rawMonth);
  const fallback = ymFromDate(target === "historyDate" ? (state.historyDate || today()) : (state.selectedDate || state.newItemDate || today())).split("-");
  if(!year || rawYear.length < 4) year = Number(fallback[0]) || new Date().getFullYear();
  if(!month) month = Number(fallback[1]) || 1;
  month = Math.max(1, Math.min(12, month));
  year = Math.max(1900, Math.min(2999, year));
  yearEl.value = String(year);
  monthEl.value = String(month).padStart(2,"0");
  const nextDate = dateFromYearMonthKeepingDay(target, year, month);
  const current = target === "historyDate" ? state.historyDate : (target === "dateInput" ? state.selectedDate : state.newItemDate);
  const hidden = document.getElementById(target);
  if(hidden) hidden.value = nextDate;
  if(String(current || "") === nextDate) return;

function syncBusinessDateAndShiftIfNeeded(){
  const nextDate = today();
  const nextShift = currentBusinessShift();
  const prevDate = businessDateSyncState.date;
  const prevShift = businessDateSyncState.shift;
  if(nextDate === prevDate && nextShift === prevShift) return;
  businessDateSyncState = { date: nextDate, shift: nextShift };
  if(!state.currentUser || !state.profile) return;
  const patch = {};
  if(!state.newItemDate || state.newItemDate === prevDate) patch.newItemDate = nextDate;
  if(!state.selectedDate || state.selectedDate === prevDate) patch.selectedDate = nextDate;
  if(!state.historyDate || state.historyDate === prevDate) patch.historyDate = nextDate;
  if(!state.newItemShift || state.newItemShift === prevShift) patch.newItemShift = nextShift;
  if(Object.keys(patch).length) setState(patch);
}

function handoverRecordTimeValue(item){
  const candidates = [item.updatedAt, item.createdAt];
  for(const value of candidates){
    if(!value) continue;
    if(typeof value.toMillis === "function") return value.toMillis();
    if(typeof value.seconds === "number") return value.seconds * 1000;
    const parsed = Date.parse(value);
    if(!Number.isNaN(parsed)) return parsed;
  }
  const fallback = Date.parse(`${item.date || today()}T23:59:59`);
  return Number.isNaN(fallback) ? 0 : fallback;
}

async function forceMobileHandoverSync(reason='manual'){
  if(!state.currentUser && !state.profile) return;
  const now = Date.now();
  if(mobileHandoverSyncInFlight) return;
  if(reason !== 'login' && reason !== 'forms-enter' && now - lastMobileHandoverSyncAt < 900) return;
  mobileHandoverSyncInFlight = true;
  lastMobileHandoverSyncAt = now;
  document.body?.classList?.add('mobile-syncing');
  try{
    const [handoverSnap, userSnap, storeSnap] = await Promise.all([
      getDocs(collection(db,'handovers')),
      getDocs(collection(db,'users')),
      getDocs(collection(db,'stores'))
    ]);
    const patch = {
      handovers: handoverSnap.docs.map(d=>({id:d.id,...d.data(),storeId:normalizeStoreId(d.data().storeId)})),
      users: userSnap.docs.map(d=>({id:d.id,...d.data(),role:normalizeRole(d.data().role)})),
      handoverMobileSyncedAt:new Date().toISOString(),
      handoverMobileSyncReason:reason
    };
    const stores = storeSnap.docs.map(d=>({id:d.id,...d.data(), name: normalizeStoreName(d.id, d.data().name)})).sort((a,b)=>String(a.id).localeCompare(String(b.id)));
    if(stores.length){
      patch.stores = stores;
      patch.storeDrafts = Object.fromEntries(stores.map(row => [row.id, normalizeStoreName(row.id, row.name)]));
    }
    setState(patch);
    setTimeout(()=>{
      const el = document.querySelector('.month-days-strip') || document.querySelector('.date-calendar') || document.getElementById('formsSection') || document.getElementById('dashboardFilterBar');
      if(el){ el.classList.add('mobile-sync-flash'); setTimeout(()=>el.classList.remove('mobile-sync-flash'), 800); }
    }, 0);
  }catch(e){
    console.error('9.2.3 手機即時同步交接資料失敗', e);
  }finally{
    mobileHandoverSyncInFlight = false;
    setTimeout(()=>document.body?.classList?.remove('mobile-syncing'), 250);
  }
}
function scheduleMobileHandoverSync(reason='schedule'){
  if(!shouldUseMobileHandoverSync()) return;

}

<script id="v829-desktop-wheel-scroll-fix-script">
(function(){
  if(window.__v829DesktopWheelScrollFix) return;
  window.__v829DesktopWheelScrollFix = true;

  function isDesktop(){
    return window.matchMedia && window.matchMedia('(min-width: 761px)').matches;
  }
  function isEditable(el){
    return !!(el && el.closest && el.closest('input, textarea, select, [contenteditable="true"]'));
  }
  function hasOpenOverlay(){
    return !!document.querySelector('.modalbg, .biometric-upgrade-modal, [role="dialog"], .date-calendar');
  }
  function getScrollableAncestor(el, deltaY){
    var node = el;
    while(node && node !== document.body && node !== document.documentElement){
      if(node instanceof HTMLElement){
        var style = window.getComputedStyle(node);
        var oy = style.overflowY;
        var canScroll = /(auto|scroll|overlay)/.test(oy) && node.scrollHeight > node.clientHeight + 2;
        if(canScroll){
          var atTop = node.scrollTop <= 0;
          var atBottom = node.scrollTop + node.clientHeight >= node.scrollHeight - 2;
          if((deltaY < 0 && !atTop) || (deltaY > 0 && !atBottom)) return node;
        }
      }
      node = node.parentElement;
    }
    return null;
  }

  document.addEventListener('wheel', function(e){
    if(!isDesktop()) return;
    if(!e || !e.deltaY) return;
    if(e.ctrlKey) return;
    if(isEditable(e.target)) return;
    if(hasOpenOverlay()) return;
    if(getScrollableAncestor(e.target, e.deltaY)) return;

    var before = window.scrollY || document.documentElement.scrollTop || document.body.scrollTop || 0;
    var max = Math.max(0, document.documentElement.scrollHeight - window.innerHeight);
    if(max <= 0) return;
    if((e.deltaY < 0 && before <= 0) || (e.deltaY > 0 && before >= max)) return;

    e.preventDefault();
    window.scrollBy({top:e.deltaY, left:0, behavior:'auto'});
  }, {capture:true, passive:false});
})();
</script>
